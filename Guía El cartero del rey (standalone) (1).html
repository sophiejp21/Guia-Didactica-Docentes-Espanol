  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

u002Fp>\n    <h1 style=\"margin:0 auto; max-width:20ch; font-family:'Fraunces',serif; font-weight:800; font-size:clamp(32px,8vw,60px); line-height:1.08; color:#F7F2E9; text-wrap:balance;\">Improvisación Teatral y Análisis Literario de «El cartero del rey»<\u002Fh1>\n    <p style=\"max-width: 62ch; margin: 22px auto 0; color: rgba(247,242,233,.82); line-height: 27.95px\">Esta guía didáctica propone un enfoque innovador para el análisis y la comprensión del texto dramático «El cartero del rey» de Rabindranath Tagore mediante técnicas de improvisación teatral que estimulan la asociación, la escucha, la aceptación y la construcción de historias en el aula.<\u002Fp>\n    <div style=\"display:flex; flex-wrap:wrap; justify-content:center; gap:8px; margin:26px 0 0;\">\n      <span style=\"padding:8px 14px; background:transparent; border:1px solid rgba(247,242,233,.28); border-radius:999px; font-size:12.5px; color:#EFE7D8;\">Libro: El cartero del rey<\u002Fspan>\n      <span style=\"padding:8px 14px; background:transparent; border:1px solid rgba(247,242,233,.28); border-radius:999px; font-size:12.5px; color:#EFE7D8;\">Autor: Rabindranath Tagore<\u002Fspan>\n      <span style=\"padding:8px 14px; background:transparent; border:1px solid rgba(247,242,233,.28); border-radius:999px; font-size:12.5px; color:#EFE7D8;\">Imprenta Nacional, Editorial Digital<\u002Fspan>\n    <\u002Fdiv>\n    <a href=\"#menu\" style=\"display:inline-block; margin:30px 0 0; padding:14px 28px; background:#8F2F2C; color:#F7F2E9; border-radius:999px; font-size:14.5px; font-weight:700; text-decoration:none;\">Explorar la guía ↓<\u002Fa>\n  <\u002Fsection>\n\n  <!-- ===== Menú principal ===== -->\n  <section id=\"menu\" data-screen-label=\"Menú principal\" style=\"padding:clamp(44px,7vw,72px) 20px; scroll-margin-top:120px;\">\n    <div style=\"max-width:1080px; margin:0 auto;\">\n      <h2 style=\"margin: 0 0 24px; font-family: 'Fraunces',serif; font-weight: 800; font-size: clamp(26px,5.5vw,40px); color: #26211B; line-height: 53.5px\">Menú principal<\u002Fh2>\n      <div style=\"display:grid; grid-template-columns:repeat(auto-fill, minmax(250px, 1fr)); gap:14px;\">\n        <a href=\"#introduccion\" style=\"display:flex; gap:14px; align-items:flex-start; background:#FFFDF8; border:1px solid #D9D0C1; border-radius:14px; padding:18px; text-decoration:none; color:inherit;\"><span style=\"flex:none; width:34px; height:34px; border-radius:50%; background:#8F2F2C; color:#F7F2E9; display:grid; place-items:center; font-family:'Fraunces',serif; font-weight:700; font-size:16px;\">1<\u002Fspan><span style=\"line-height: 24.15px\"><strong style=\"display:block; font-family:'Fraunces',serif; font-size:1.05em; color:#26211B;\">Introducción<\u002Fstrong><span style=\"font-size: .85em; color: #5C5446; line-height: 7.99px\">Fundamentos teóricos y metodológicos de la improvisación teatral aplicada al análisis literario.<\u002Fspan><\u002Fspan><\u002Fa>\n        <a href=\"#consejos\" style=\"display:flex; gap:14px; align-items:flex-start; background:#FFFDF8; border:1px solid #D9D0C1; border-radius:14px; padding:18px; text-decoration:none; color:inherit;\"><span style=\"flex:none; width:34px; height:34px; border-radius:50%; background:#8F2F2C; color:#F7F2E9; display:grid; place-items:center; font-family:'Fraunces',serif; font-weight:700; font-size:16px;\">2<\u002Fspan><span style=\"line-height: 24.25px\"><strong style=\"display: block; font-family: 'Fraunces',serif; font-size: 1.05em; color: #26211B; line-height: 23.85px\">Consejos para <br>usar la guía<\u002Fstrong><span style=\"font-size:.85em; color:#5C5446;\">Recomendaciones prácticas para implementar las actividades en el aula con éxito.<\u002Fspan><\u002Fspan><\u002Fa>\n        <a href=\"#objetivos\" style=\"display:flex; gap:14px; align-items:flex-start; background:#FFFDF8; border:1px solid #D9D0C1; border-radius:14px; padding:18px; text-decoration:none; color:inherit;\"><span style=\"flex:none; width:34px; height:34px; border-radius:50%; background:#8F2F2C; color:#F7F2E9; display:grid; place-items:center; font-family:'Fraunces',serif; font-weight:700; font-size:16px;\">3<\u002Fspan><span style=\"line-height: 24px\"><strong style=\"display: block; font-family: 'Fraunces',serif; font-size: 1.05em; color: #26211B; line-height: 23.95px\">Objetivos de aprendizaje<\u002Fstrong><span style=\"font-size:.85em; color:#5C5446;\">Competencias y habilidades que se desarrollarán a través de las actividades propuestas.<\u002Fspan><\u002Fspan><\u002Fa>\n        <a href=\"#criterios\" style=\"display:flex; gap:14px; align-items:flex-start; background:#FFFDF8; border:1px solid #D9D0C1; border-radius:14px; padding:18px; text-decoration:none; color:inherit;\"><span style=\"flex:none; width:34px; height:34px; border-radius:50%; background:#8F2F2C; color:#F7F2E9; display:grid; place-items:center; font-family:'Fraunces',serif; font-weight:700; font-size:16px;\">4<\u002Fspan><span style=\"line-height: 24.05px\"><strong style=\"display: block; font-family: 'Fraunces',serif; font-size: 1.05em; color: #26211B; line-height: 23.65px\">Criterios de evaluación<\u002Fstrong><span style=\"font-size:.85em; color:#5C5446;\">Pautas para valorar el progreso y los logros de la persona estudiante durante el proceso.<\u002Fspan><\u002Fspan><\u002Fa>\n        <a href=\"#sesion1\" style=\"display:flex; gap:14px; align-items:flex-start; background:#FFFDF8; border:1px solid #D9D0C1; border-radius:14px; padding:18px; text-decoration:none; color:inherit;\"><span style=\"flex:none; width:34px; height:34px; border-radius:50%; background:#8F2F2C; color:#F7F2E9; display:grid; place-items:center; font-family:'Fraunces',serif; font-weight:700; font-size:16px;\">5<\u002Fspan><span style=\"line-height: 23.85px\"><strong style=\"display: block; font-family: 'Fraunces',serif; font-size: 1.05em; color: #26211B; line-height: 24.2px\">Sesiones (I–VI)<\u002Fstrong><span style=\"font-size:.85em; color:#5C5446;\">Secuencia didáctica organizada en seis sesiones progresivas para explorar la obra.<\u002Fspan><\u002Fspan><\u002Fa>\n        <a href=\"#sesion2\" style=\"display:flex; gap:14px; align-items:flex-start; background:#FFFDF8; border:1px solid #D9D0C1; border-radius:14px; padding:18px; text-decoration:none; color:inherit;\"><span style=\"flex:none; width:34px; height:34px; border-radius:50%; background:#8F2F2C; color:#F7F2E9; display:grid; place-items:center; font-family:'Fraunces',serif; font-weight:700; font-size:16px;\">6<\u002Fspan><span style=\"line-height: 24.35px\"><strong style=\"display: block; font-family: 'Fraunces',serif; font-size: 1.05em; color: #26211B; line-height: 23.65px\">Fichas técnicas<\u002Fstrong><span style=\"font-size:.85em; color:#5C5446;\">Descripción detallada de cada ejercicio con sus objetivos, materiales y variaciones.<\u002Fspan><\u002Fspan><\u002Fa>\n        <a href=\"#ideas\" style=\"display:flex; gap:14px; align-items:flex-start; background:#FFFDF8; border:1px solid #D9D0C1; border-radius:14px; padding:18px; text-decoration:none; color:inherit;\"><span style=\"flex:none; width:34px; height:34px; border-radius:50%; background:#8F2F2C; color:#F7F2E9; display:grid; place-items:center; font-family:'Fraunces',serif; font-weight:700; font-size:16px;\">7<\u002Fspan><span style=\"line-height: 24.1px\"><strong style=\"display: block; font-family: 'Fraunces',serif; font-size: 1.05em; color: #26211B; line-height: 24.3px\">Ideas clave<\u002Fstrong><span style=\"font-size:.85em; color:#5C5446;\">Conceptos fundamentales para recordar sobre la improvisación y el análisis literario.<\u002Fspan><\u002Fspan><\u002Fa>\n        <a href=\"#referencias\" style=\"display:flex; gap:14px; align-items:flex-start; background:#FFFDF8; border:1px solid #D9D0C1; border-radius:14px; padding:18px; text-decoration:none; color:inherit;\"><span style=\"flex:none; width:34px; height:34px; border-radius:50%; background:#8F2F2C; color:#F7F2E9; display:grid; place-items:center; font-family:'Fraunces',serif; font-weight:700; font-size:16px;\">8<\u002Fspan><span style=\"line-height: 23.55px\"><strong style=\"display: block; font-family: 'Fraunces',serif; font-size: 1.05em; color: #26211B; line-height: 23.8px\">Referencias<\u002Fstrong><span style=\"font-size:.85em; color:#5C5446;\">Fuentes bibliográficas para profundizar.<\u002Fspan><\u002Fspan><\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== Introducción ===== -->\n  <section id=\"introduccion\" data-screen-label=\"Introducción\" style=\"padding:0 20px clamp(44px,7vw,72px); scroll-margin-top:120px;\">\n    <div style=\"max-width:1080px; margin:0 auto;\">\n      <p style=\"margin:0 0 6px; font-size:11.5px; font-weight:700; letter-spacing:2.5px; color:#8F2F2C;\">PARTE 1<\u002Fp>\n      <h2 style=\"margin: 0 0 24px; font-family: 'Fraunces',serif; font-weight: 800; font-size: clamp(26px,5.5vw,40px); color: #26211B; line-height: 54.25px\">Introducción: <br>Un Puente entre Literatura y Escena<\u002Fh2>\n      <div style=\"display:grid; grid-template-columns:repeat(auto-fit, minmax(280px, 1fr)); gap:14px;\">\n        <article style=\"background:#FFFDF8; border:1px solid #D9D0C1; border-radius:14px; padding:22px;\">\n          <h3 style=\"margin: 0 0 10px; font-family: 'Fraunces',serif; font-weight: 700; font-size: 1.25em; color: #26211B; line-height: 27.66px\">Explorando la obra <br>a través de la improvisación<\u002Fh3>\n          <p style=\"margin: 0; line-height: 27.8px\">Esta guía invita a profesores de español de secundaria en Costa Rica a explorar la obra «El cartero del rey» de Tagore mediante la improvisación teatral, yendo más allá del análisis literario tradicional.<\u002Fp>\n        <\u002Farticle>\n        <article style=\"background:#FFFDF8; border:1px solid #D9D0C1; border-radius:14px; padding:22px;\">\n          <h3 style=\"margin: 0 0 10px; font-family: 'Fraunces',serif; font-weight: 700; font-size: 1.25em; color: #26211B; line-height: 27.81px\">Conexión emocional <br>con el texto<\u002Fh3>\n          <p style=\"margin: 0; line-height: 27.95px\">El objetivo es que las personas estudiantes vivan y encarnen la obra, desarrollando una conexión profunda. La poética de Tagore servirá para explorar temas universales como esperanza, enfermedad y muerte.<\u002Fp>\n        <\u002Farticle>\n        <article style=\"background:#FFFDF8; border:1px solid #D9D0C1; border-radius:14px; padding:22px;\">\n          <h3 style=\"margin: 0 0 10px; font-family: 'Fraunces',serif; font-weight: 700; font-size: 1.25em; color: #26211B; line-height: 28.16px\">Desarrollo de habilidades del siglo XXI<\u002Fh3>\n          <p style=\"margin:0;\">La improvisación explorará conceptos literarios, permitiendo <br>a las personas estudiantes que interpreten personajes y conflictos de forma espontánea. Esto cultivará pensamiento crítico, comunicación <br>y empatía.<\u002Fp>\n        <\u002Farticle>\n      <\u002Fdiv>\n      <p style=\"margin:18px 0 0; padding:16px 20px; background:#EFE7D8; border-radius:12px; color:#6E201E;\">La improvisación teatral conecta emocionalmente a las personas estudiantes con la obra, facilitando una comprensión más profunda del texto literario.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== Consejos ===== -->\n  <section id=\"consejos\" data-screen-label=\"Consejos para usar la guía\" style=\"padding:0 20px clamp(44px,7vw,72px); scroll-margin-top:120px;\">\n    <div style=\"max-width:1080px; margin:0 auto;\">\n      <p style=\"margin:0 0 6px; font-size:11.5px; font-weight:700; letter-spacing:2.5px; color:#8F2F2C;\">PARTE 2<\u002Fp>\n      <h2 style=\"margin: 0 0 10px; font-family: 'Fraunces',serif; font-weight: 800; font-size: clamp(26px,5.5vw,40px); color: #26211B; line-height: 53.75px\">Consejos para una implementación de la guía<\u002Fh2>\n      <p style=\"margin:0 0 22px; max-width:70ch; color:#5C5446;\">Para maximizar el impacto de esta guía didáctica y asegurar una experiencia fluida y enriquecedora, se recomienda encarecidamente considerar los siguientes aspectos prácticos:<\u002Fp>\n      <div style=\"display:grid; gap:10px;\">\n        <details style=\"background:#FFFDF8; border:1px solid #D9D0C1; border-radius:12px;\">\n          <summary style=\"display:flex; align-items:center; gap:12px; padding:15px 18px; font-weight:700; color:#26211B;\"><span data-chev=\"1\" style=\"display:inline-block; color:#8F2F2C; font-size:11px;\">▶<\u002Fspan>Lenguaje inclusivo<\u002Fsummary>\n          <p style=\"margin:0; padding:0 18px 16px 39px;\">Es imperativo utilizar lenguaje inclusivo en todo momento, tanto en la comunicación con las personas estudiantes como en la interpretación de los roles. Esto asegura un ambiente de respeto, igualdad y pertenencia para todas las personas, fomentando la libre expresión sin temor a la discriminación o el juicio. La sensibilidad lingüística es clave para construir un espacio seguro y propicio para el aprendizaje.<\u002Fp>\n        <\u002Fdetails>\n        <details style=\"background:#FFFDF8; border:1px solid #D9D0C1; border-radius:12px;\">\n          <summary style=\"display:flex; align-items:center; gap:12px; padding:15px 18px; font-weight:700; color:#26211B;\"><span data-chev=\"1\" style=\"display:inline-block; color:#8F2F2C; font-size:11px;\">▶<\u002Fspan>Organización secuencial<\u002Fsummary>\n          <p style=\"margin:0; padding:0 18px 16px 39px;\">La guía está estructurada en sesiones temáticas, con actividades secuenciales diseñadas para construir conocimientos y habilidades de manera progresiva. Se sugiere seguir el orden propuesto para garantizar una base sólida en improvisación teatral antes de abordar conceptos más complejos o la aplicación directa a la obra literaria. Cada sesión se apoya en la anterior, creando un flujo de aprendizaje coherente.<\u002Fp>\n        <\u002Fdetails>\n        <details style=\"background:#FFFDF8; border:1px solid #D9D0C1; border-radius:12px;\">\n          <summary style=\"display:flex; align-items:center; gap:12px; padding:15px 18px; font-weight:700; color:#26211B;\"><span data-chev=\"1\" style=\"display:inline-block; color:#8F2F2C; font-size:11px;\">▶<\u002Fspan>Lectura previa integral<\u002Fsummary>\n          <p style=\"margin:0; padding:0 18px 16px 39px;\">Antes de iniciar la aplicación práctica, se recomienda leer la guía completa, familiarizándose con todas las actividades y objetivos. Posteriormente, se sugiere profundizar en las fichas técnicas que ofrecen detalles metodológicos y recursos adicionales. Esta visión global permitirá a la persona docente adaptar el contenido y planificar eficazmente cada sesión.<\u002Fp>\n        <\u002Fdetails>\n        <details style=\"background:#FFFDF8; border:1px solid #D9D0C1; border-radius:12px;\">\n          <summary style=\"display:flex; align-items:center; gap:12px; padding:15px 18px; font-weight:700; color:#26211B;\"><span data-chev=\"1\" style=\"display:inline-block; color:#8F2F2C; font-size:11px;\">▶<\u002Fspan>Uso de recursos audiovisuales (opcional)<\u002Fsummary>\n          <p style=\"margin:0; padding:0 18px 16px 39px;\">Los videos sugeridos en la guía complementan las actividades teóricas y prácticas. Sin embargo, su uso es opcional y depende de la disponibilidad de conectividad y recursos tecnológicos en el aula. Si no se cuenta con acceso a internet, las actividades pueden adaptarse o realizarse sin el apoyo audiovisual, centrándose en la interacción y la exploración presencial de las imágenes establecidas en esta guía.<\u002Fp>\n        <\u002Fdetails>\n        <details style=\"background:#FFFDF8; border:1px solid #D9D0C1; border-radius:12px;\">\n          <summary style=\"display:flex; align-items:center; gap:12px; padding:15px 18px; font-weight:700; color:#26211B;\"><span data-chev=\"1\" style=\"display:inline-block; color:#8F2F2C; font-size:11px;\">▶<\u002Fspan>Fomento de un ambiente de confianza<\u002Fsummary>\n          <p style=\"margin:0; padding:0 18px 16px 39px;\">La improvisación prospera en un entorno donde las personas estudiantes se sienten seguras para experimentar, cometer errores y expresarse libremente. El rol de la persona docente es fundamental para crear este ambiente, promoviendo la no crítica, la aceptación y el apoyo mutuo. Los ejercicios de calentamiento y desinhibición son cruciales al inicio de cada sesión para relajar a las personas participantes y prepararlas para la creatividad.<\u002Fp>\n        <\u002Fdetails>\n        <details style=\"background:#FFFDF8; border:1px solid #D9D0C1; border-radius:12px;\">\n          <summary style=\"display:flex; align-items:center; gap:12px; padding:15px 18px; font-weight:700; color:#26211B;\"><span data-chev=\"1\" style=\"display:inline-block; color:#8F2F2C; font-size:11px;\">▶<\u002Fspan>Flexibilidad y adaptación<\u002Fsummary>\n          <p style=\"margin:0; padding:0 18px 16px 39px;\">Cada grupo de estudiantes es único, con diferentes ritmos de aprendizaje y niveles de experiencia. La guía está diseñada con diferentes objetivos pedagógicos para ser flexible, permitiendo a la persona docente adaptar las actividades, los tiempos y los enfoques según las necesidades específicas de su clase. No dude en modificar los ejercicios, añadir sus propias variantes o extender el tiempo de una actividad si el grupo lo requiere. La improvisación es un ejercicio de cambios constantes.<\u002Fp>\n        <\u002Fdetails>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== Objetivos ===== -->\n  <section id=\"objetivos\" data-screen-label=\"Objetivos de aprendizaje\" style=\"padding:0 20px clamp(44px,7vw,72px); scroll-margin-top:120px;\">\n    <div style=\"max-width:1080px; margin:0 auto;\">\n      <p style=\"margin:0 0 6px; font-size:11.5px; font-weight:700; letter-spacing:2.5px; color:#8F2F2C;\">PARTE 3<\u002Fp>\n      <h2 style=\"margin: 0 0 10px; font-family: 'Fraunces',serif; font-weight: 800; font-size: clamp(26px,5.5vw,40px); color: #26211B; line-height: 54.15px\">Objetivos de aprendizaje: Sembrando la semilla <br>de la expresión<\u002Fh2>\n      <p style=\"margin:0 0 22px; max-width:70ch; color:#5C5446;\">Al finalizar la implementación de esta guía didáctica, se espera que las personas estudiantes alcancen los siguientes objetivos de aprendizaje, que abarcan tanto el ámbito literario como el teatral y el desarrollo de habilidades didácticas:<\u002Fp>\n      <div style=\"display:grid; grid-template-columns:repeat(auto-fit, minmax(290px, 1fr)); gap:14px;\">\n        <article style=\"background:#FFFDF8; border:1px solid #D9D0C1; border-radius:14px; padding:22px;\">\n          <p style=\"margin:0 0 8px; font-family:'Fraunces',serif; font-weight:800; font-size:1.9em; color:#D6A056; line-height:1;\">1<\u002Fp>\n          <h3 style=\"margin:0 0 10px; font-family:'Fraunces',serif; font-weight:700; font-size:1.15em; color:#26211B;\">Estimular la comprensión del texto dramático mediante la interpretación corporal y verbal<\u002Fh3>\n          <p style=\"margin: 0; font-size: .93em; line-height: 27.79px\">Más allá de la lectura pasiva, buscamos que las personas estudiantes encarnen los diálogos, las emociones y los conflictos de «El cartero del rey». Al moverse, hablar y reaccionar como los personajes, internalizarán la trama, los temas y el estilo literario de Tagore de una manera multisensorial y kinestésica. La interpretación transformará el texto en una experiencia vivida.<\u002Fp>\n        <\u002Farticle>\n        <article style=\"background:#FFFDF8; border:1px solid #D9D0C1; border-radius:14px; padding:22px;\">\n          <p style=\"margin:0 0 8px; font-family:'Fraunces',serif; font-weight:800; font-size:1.9em; color:#D6A056; line-height:1;\">2<\u002Fp>\n          <h3 style=\"margin:0 0 10px; font-family:'Fraunces',serif; font-weight:700; font-size:1.15em; color:#26211B;\">Aplicar principios básicos de la improvisación teatral al trabajo literario<\u002Fh3>\n          <p style=\"margin: 0; font-size: .93em; line-height: 27.79px\">Las personas estudiantes aprenderán y pondrán en práctica conceptos fundamentales de la improvisación, como la «aceptación» (decir «sí» a las propuestas del compañero o la compañera), la «escucha activa», la «espontaneidad» y la «construcción de historias conjuntas». Estas herramientas teatrales se convertirán en lentes poderosos para analizar la estructura dramática, el desarrollo de personajes y la progresión narrativa de la obra de Tagore.<\u002Fp>\n        <\u002Farticle>\n        <article style=\"background:#FFFDF8; border:1px solid #D9D0C1; border-radius:14px; padding:22px;\">\n          <p style=\"margin:0 0 8px; font-family:'Fraunces',serif; font-weight:800; font-size:1.9em; color:#D6A056; line-height:1;\">3<\u002Fp>\n          <h3 style=\"margin:0 0 10px; font-family:'Fraunces',serif; font-weight:700; font-size:1.15em; color:#26211B;\">Fomentar el trabajo colaborativo y la expresión creativa a partir del texto<\u002Fh3>\n          <p style=\"margin: 0; font-size: .93em; line-height: 27.59px\">La improvisación es inherentemente una actividad grupal que exige confianza y cooperación. Las personas estudiantes trabajarán en equipo para construir escenas, desarrollar personajes y resolver situaciones dramáticas de forma colectiva. <br>Este proceso mejorará sus habilidades de comunicación interpersonal y estimulará su creatividad individual y colectiva <br>a partir del marco del texto.<\u002Fp>\n        <\u002Farticle>\n        <article style=\"background:#FFFDF8; border:1px solid #D9D0C1; border-radius:14px; padding:22px;\">\n          <p style=\"margin:0 0 8px; font-family:'Fraunces',serif; font-weight:800; font-size:1.9em; color:#D6A056; line-height:1;\">4<\u002Fp>\n          <h3 style=\"margin:0 0 10px; font-family:'Fraunces',serif; font-weight:700; font-size:1.15em; color:#26211B;\">Desarrollar la escucha activa, la espontaneidad y la aceptación en el proceso grupal<\u002Fh3>\n          <p style=\"margin: 0; font-size: .93em; line-height: 27.99px\">Estas tres habilidades son los pilares de la improvisación y son transferibles a cualquier ámbito de la vida. La escucha activa les permitirá comprender profundamente las aportaciones de sus compañeros o compañeras y el contexto dramático. La espontaneidad fomentará la confianza en sus impulsos creativos. La aceptación les enseñará a construir sobre las ideas de los demás, transformando los «errores» en oportunidades y creando un ambiente de apoyo y co-creación.<\u002Fp>\n        <\u002Farticle>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== Criterios ===== -->\n  <section id=\"criterios\" data-screen-label=\"Criterios de evaluación\" style=\"padding:0 20px clamp(44px,7vw,72px); scroll-margin-top:120px;\">\n    <div style=\"max-width:1080px; margin:0 auto;\">\n      <p style=\"margin:0 0 6px; font-size:11.5px; font-weight:700; letter-spacing:2.5px; color:#8F2F2C;\">PARTE 4<\u002Fp>\n      <h2 style=\"margin:0 0 10px; font-family:'Fraunces',serif; font-weight:800; font-size:clamp(26px,5.5vw,40px); color:#26211B;\">Criterios de evaluación: Midiendo el fluir creativo<\u002Fh2>\n      <p style=\"margin:0 0 22px; max-width:70ch; color:#5C5446;\">La evaluación en el contexto de la improvisación teatral y el análisis literario debe ser holística y centrarse tanto en el proceso como en los resultados. Los siguientes criterios servirán para valorar el desempeño de las personas estudiantes:<\u002Fp>\n      <div style=\"display:grid; gap:12px;\">\n        <article style=\"display:flex; gap:16px; background:#FFFDF8; border:1px solid #D9D0C1; border-radius:14px; padding:20px;\">\n          <span style=\"flex:none; width:34px; height:34px; border-radius:50%; background:#EFE7D8; color:#6E201E; display:grid; place-items:center; font-family:'Fraunces',serif; font-weight:800;\">1<\u002Fspan>\n          <div><h3 style=\"margin:0 0 6px; font-family:'Fraunces',serif; font-weight:700; font-size:1.1em; color:#26211B;\">Participación activa y respetuosa en las actividades<\u002Fh3><p style=\"margin: 0; font-size: .93em; line-height: 27.64px\">Se valorará la disposición de la persona estudiante a involucrarse en todos los ejercicios, aportando ideas y energía al grupo. Más allá de la cantidad, se observará la participación, el respeto, la valoración de las ideas y la contribución positiva al ambiente de trabajo. Un o una participante activo es aquel que se arriesga, se divierte y apoya a sus compañeros o compañeras.<\u002Fp><\u002Fdiv>\n        <\u002Farticle>\n        <article style=\"display:flex; gap:16px; background:#FFFDF8; border:1px solid #D9D0C1; border-radius:14px; padding:20px;\">\n          <span style=\"flex:none; width:34px; height:34px; border-radius:50%; background:#EFE7D8; color:#6E201E; display:grid; place-items:center; font-family:'Fraunces',serif; font-weight:800;\">2<\u002Fspan>\n          <div><h3 style=\"margin:0 0 6px; font-family:'Fraunces',serif; font-weight:700; font-size:1.1em; color:#26211B;\">Comprensión del texto literario a través de la acción escénica<\u002Fh3><p style=\"margin: 0; font-size: .93em; line-height: 27.89px\">Este criterio se centrará en cómo la persona estudiante utiliza la improvisación para demostrar su entendimiento de «El cartero del rey». Se observará si las escenas improvisadas reflejan los personajes, los temas, los conflictos y el ambiente de la obra. ¿Las acciones y diálogos improvisados son coherentes con el personaje de Amal, el cartero, el médico, o el rey? ¿Se logra transmitir las escenas de Tagore a través de la interpretación?<\u002Fp><\u002Fdiv>\n        <\u002Farticle>\n        <article style=\"display:flex; gap:16px; background:#FFFDF8; border:1px solid #D9D0C1; border-radius:14px; padding:20px;\">\n          <span style=\"flex:none; width:34px; height:34px; border-radius:50%; background:#EFE7D8; color:#6E201E; display:grid; place-items:center; font-family:'Fraunces',serif; font-weight:800;\">3<\u002Fspan>\n          <div><h3 style=\"margin:0 0 6px; font-family:'Fraunces',serif; font-weight:700; font-size:1.1em; color:#26211B;\">Capacidad de improvisar de manera coherente y construir con los demás<\u002Fh3><p style=\"margin: 0; font-size: .93em; line-height: 27.79px\">Se evaluará la habilidad de la persona estudiante para crear escenas fluidas y lógicas a partir de un punto de partida. Esto incluye la capacidad de decir «sí y…» a las propuestas de sus compañeros o compañeras, desarrollando la narrativa de forma grupal. Se valorará el juego y el análisis sin perder la coherencia dramática, la participación para adaptarse a situaciones diferentes y mantener las ganas de seguir explorando en la improvisación teatral.<\u002Fp><\u002Fdiv>\n        <\u002Farticle>\n        <article style=\"display:flex; gap:16px; background:#FFFDF8; border:1px solid #D9D0C1; border-radius:14px; padding:20px;\">\n          <span style=\"flex:none; width:34px; height:34px; border-radius:50%; background:#EFE7D8; color:#6E201E; display:grid; place-items:center; font-family:'Fraunces',serif; font-weight:800;\">4<\u002Fspan>\n          <div><h3 style=\"margin:0 0 6px; font-family:'Fraunces',serif; font-weight:700; font-size:1.1em; color:#26211B;\">Reflexión crítica sobre los temas y personajes de la obra<\u002Fh3><p style=\"margin: 0; font-size: .93em; line-height: 27.74px\">Más allá de la improvisación, se analizará la conciencia de la persona estudiante sobre el uso de interpretación en sus diálogos y reflexiones. Además, se valorará su capacidad para establecer conexiones críticas entre los temas de «El cartero del rey» (como la libertad, la muerte, la imaginación, la autoridad) y su propia realidad o la sociedad. ¿Pueden las personas estudiantes expresar una opinión relacionada y reflexiva sobre lo que la obra les enseña, tanto a nivel personal como social?<\u002Fp><\u002Fdiv>\n        <\u002Farticle>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== Tabla de contenido ===== -->\n  <section id=\"tabla\" data-screen-label=\"Tabla de contenido\" style=\"padding:0 20px clamp(44px,7vw,72px); scroll-margin-top:120px;\">\n    <div style=\"max-width:1080px; margin:0 auto;\">\n      <p style=\"margin:0 0 6px; font-size:11.5px; font-weight:700; letter-spacing:2.5px; color:#8F2F2C;\">EL MAPA DE LA GUÍA<\u002Fp>\n      <h2 style=\"margin: 0 0 10px; font-family: 'Fraunces',serif; font-weight: 800; font-size: clamp(26px,5.5vw,40px); color: #26211B; line-height: 54.15px\">Tabla de contenido: El viaje a través de la improvisación y Tagore<\u002Fh2>\n      <p style=\"margin:0 0 28px; max-width:70ch; color:#5C5446;\">Seis sesiones que parten de un mismo centro. Toca cualquier estación del mapa para ir directo a esa sesión.<\u002Fp>\n      <div style=\"display:flex; flex-direction:column; align-items:center;\">\n        <div style=\"background:#1D1715; border:1px solid rgba(214,160,86,.55); border-radius:999px; padding:16px 32px; text-align:center; box-shadow:0 6px 20px rgba(29,23,21,.25);\">\n          <p style=\"margin:0; font-family:'Fraunces',serif; font-weight:800; font-size:clamp(15px,3vw,19px); letter-spacing:1px; color:#EFE7D8;\">IMPRO Y <span style=\"color:#D6A056;\">EL CARTERO DEL REY<\u002Fspan><\u002Fp>\n        <\u002Fdiv>\n        <div style=\"width:2px; height:26px; background:#D6A056;\"><\u002Fdiv>\n        <div style=\"width:100%;\">\n          <div style=\"height:2px; background:#E0D4BE; margin:0 11%;\"><\u002Fdiv>\n          <div style=\"display:grid; grid-template-columns:repeat(auto-fit, minmax(250px, 1fr)); gap:0 14px; width:100%;\">\n            <div style=\"display:flex; flex-direction:column; align-items:center;\">\n              <div style=\"width:2px; height:18px; background:#E0D4BE;\"><\u002Fdiv>\n              <a href=\"#sesion1\" style=\"flex:1; width:100%; box-sizing:border-box; display:flex; gap:13px; align-items:flex-start; background:#FFFDF8; border:1px solid #D9D0C1; border-radius:14px; padding:16px; text-decoration:none; color:inherit;\"><span style=\"flex:none; width:34px; height:34px; border-radius:50%; background:#1D1715; color:#D6A056; display:grid; place-items:center; font-family:'Fraunces',serif; font-weight:800; font-size:16px;\">1<\u002Fspan><span style=\"line-height: 24.15px\"><strong style=\"display:block; font-size:11px; font-weight:700; letter-spacing:1.5px; color:#8F2F2C;\">SESIÓN I<\u002Fstrong><span style=\"font-family:'Fraunces',serif; font-weight:700; font-size:1.02em; color:#26211B;\">Introducción a la Improvisación Teatral<\u002Fspan><\u002Fspan><\u002Fa>\n            <\u002Fdiv>\n            <div style=\"display:flex; flex-direction:column; align-items:center;\">\n              <div style=\"width:2px; height:18px; background:#E0D4BE;\"><\u002Fdiv>\n              <a href=\"#sesion2\" style=\"flex:1; width:100%; box-sizing:border-box; display:flex; gap:13px; align-items:flex-start; background:#FFFDF8; border:1px solid #D9D0C1; border-radius:14px; padding:16px; text-decoration:none; color:inherit;\"><span style=\"flex:none; width:34px; height:34px; border-radius:50%; background:#1D1715; color:#D6A056; display:grid; place-items:center; font-family:'Fraunces',serif; font-weight:800; font-size:16px;\">2<\u002Fspan><span style=\"line-height: 23.8px\"><strong style=\"display:block; font-size:11px; font-weight:700; letter-spacing:1.5px; color:#8F2F2C;\">SESIÓN II<\u002Fstrong><span style=\"font-family:'Fraunces',serif; font-weight:700; font-size:1.02em; color:#26211B;\">Asociación Libre y Activación Previa a la Lectura<\u002Fspan><\u002Fspan><\u002Fa>\n            <\u002Fdiv>\n            <div style=\"display:flex; flex-direction:column; align-items:center;\">\n              <div style=\"width:2px; height:18px; background:#E0D4BE;\"><\u002Fdiv>\n              <a href=\"#sesion3\" style=\"flex:1; width:100%; box-sizing:border-box; display:flex; gap:13px; align-items:flex-start; background:#FFFDF8; border:1px solid #D9D0C1; border-radius:14px; padding:16px; text-decoration:none; color:inherit;\"><span style=\"flex:none; width:34px; height:34px; border-radius:50%; background:#1D1715; color:#D6A056; display:grid; place-items:center; font-family:'Fraunces',serif; font-weight:800; font-size:16px;\">3<\u002Fspan><span style=\"line-height: 25.95px\"><strong style=\"display:block; font-size:11px; font-weight:700; letter-spacing:1.5px; color:#8F2F2C;\">SESIÓN III<\u002Fstrong><span style=\"font-family:'Fraunces',serif; font-weight:700; font-size:1.02em; color:#26211B;\">Escucha Activa Durante la Lectura<\u002Fspan><\u002Fspan><\u002Fa>\n            <\u002Fdiv>\n            <div style=\"display:flex; flex-direction:column; align-items:center;\">\n              <div style=\"width:2px; height:18px; background:#E0D4BE;\"><\u002Fdiv>\n              <a href=\"#sesion4\" style=\"flex:1; width:100%; box-sizing:border-box; display:flex; gap:13px; align-items:flex-start; background:#FFFDF8; border:1px solid #D9D0C1; border-radius:14px; padding:16px; text-decoration:none; color:inherit;\"><span style=\"flex:none; width:34px; height:34px; border-radius:50%; background:#1D1715; color:#D6A056; display:grid; place-items:center; font-family:'Fraunces',serif; font-weight:800; font-size:16px;\">4<\u002Fspan><span style=\"line-height: 24.3px\"><strong style=\"display:block; font-size:11px; font-weight:700; letter-spacing:1.5px; color:#8F2F2C;\">SESIÓN IV<\u002Fstrong><span style=\"font-family:'Fraunces',serif; font-weight:700; font-size:1.02em; color:#26211B;\">Aceptación y Exploración de Personajes<\u002Fspan><\u002Fspan><\u002Fa>\n            <\u002Fdiv>\n            <div style=\"display:flex; flex-direction:column; align-items:center;\">\n              <div style=\"width:2px; height:18px; background:#E0D4BE;\"><\u002Fdiv>\n              <a href=\"#sesion5\" style=\"flex:1; width:100%; box-sizing:border-box; display:flex; gap:13px; align-items:flex-start; background:#FFFDF8; border:1px solid #D9D0C1; border-radius:14px; padding:16px; text-decoration:none; color:inherit;\"><span style=\"flex:none; width:34px; height:34px; border-radius:50%; background:#1D1715; color:#D6A056; display:grid; place-items:center; font-family:'Fraunces',serif; font-weight:800; font-size:16px;\">5<\u002Fspan><span style=\"line-height: 23.9px\"><strong style=\"display:block; font-size:11px; font-weight:700; letter-spacing:1.5px; color:#8F2F2C;\">SESIÓN V<\u002Fstrong><span style=\"font-family:'Fraunces',serif; font-weight:700; font-size:1.02em; color:#26211B;\">Construcción de Historias y Recreación de Escenas<\u002Fspan><\u002Fspan><\u002Fa>\n            <\u002Fdiv>\n            <div style=\"display:flex; flex-direction:column; align-items:center;\">\n              <div style=\"width:2px; height:18px; background:#E0D4BE;\"><\u002Fdiv>\n              <a href=\"#sesion6\" style=\"flex:1; width:100%; box-sizing:border-box; display:flex; gap:13px; align-items:flex-start; background:#FFFDF8; border:1px solid #D9D0C1; border-radius:14px; padding:16px; text-decoration:none; color:inherit;\"><span style=\"flex:none; width:34px; height:34px; border-radius:50%; background:#1D1715; color:#D6A056; display:grid; place-items:center; font-family:'Fraunces',serif; font-weight:800; font-size:16px;\">6<\u002Fspan><span style=\"line-height: 24.25px\"><strong style=\"display:block; font-size:11px; font-weight:700; letter-spacing:1.5px; color:#8F2F2C;\">SESIÓN VI<\u002Fstrong><span style=\"font-family:'Fraunces',serif; font-weight:700; font-size:1.02em; color:#26211B;\">Recomendaciones de Libros y Videos<\u002Fspan><\u002Fspan><\u002Fa>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== Sesión 1 ===== -->\n  <section id=\"sesion1\" data-screen-label=\"Sesión 1\" style=\"padding:0 20px clamp(44px,7vw,72px); scroll-margin-top:120px;\">\n    <div style=\"max-width:1080px; margin:0 auto;\">\n      <p style=\"margin:0 0 6px; font-size:11.5px; font-weight:700; letter-spacing:2.5px; color:#8F2F2C;\">SESIÓN 1<\u002Fp>\n      <h2 style=\"margin:0 0 10px; font-family:'Fraunces',serif; font-weight:800; font-size:clamp(26px,5.5vw,40px); color:#26211B;\">¿Qué es la improvisación teatral?<\u002Fh2>\n      <p style=\"margin:0 0 14px; max-width:70ch;\">La improvisación teatral, o «impro», es una forma de hacer teatro donde las escenas se crean de forma instantánea, sin guion ni preparación previa. En este enfoque, la persona intérprete, a quien llamaremos jugadores o improvisadores, construye la ficción en el mismo momento que la está creando.<\u002Fp>\n      <p style=\"margin:0 0 22px; max-width:70ch;\">Se trata de un teatro democrático y accesible, que puede ser practicado tanto por artistas profesionales como por personas participantes sin experiencia previa, siempre desde el disfrute y la exploración creativa.<\u002Fp>\n      <div style=\"display:grid; grid-template-columns:repeat(auto-fit, minmax(260px, 1fr)); gap:14px;\">\n        <article style=\"background:#FFFDF8; border:1px solid #D9D0C1; border-radius:14px; padding:20px;\">\n          <h3 style=\"margin:0 0 10px; font-family:'Fraunces',serif; font-weight:700; font-size:1.15em; color:#26211B;\">Principios básicos<\u002Fh3>\n          <ul style=\"margin:0; padding:0 0 0 20px; display:grid; gap:6px;\"><li>Asociación libre<\u002Fli><li>Escucha activa<\u002Fli><li>Aceptación de propuestas<\u002Fli><li>Construcción colaborativa<\u002Fli><\u002Ful>\n        <\u002Farticle>\n        <article style=\"background:#FFFDF8; border:1px solid #D9D0C1; border-radius:14px; padding:20px;\">\n          <h3 style=\"margin:0 0 10px; font-family:'Fraunces',serif; font-weight:700; font-size:1.15em; color:#26211B;\">Beneficios educativos<\u002Fh3>\n          <ul style=\"margin:0; padding:0 0 0 20px; display:grid; gap:6px;\"><li>Desarrollo de la creatividad<\u002Fli><li>Mejora de habilidades comunicativas<\u002Fli><li>Fomento del trabajo en equipo<\u002Fli><li>Auto exploración emocional<\u002Fli><\u002Ful>\n        <\u002Farticle>\n        <article style=\"background:#EFE7D8; border:1px solid #E0D4BE; border-radius:14px; padding:20px;\">\n          <h3 style=\"margin:0 0 10px; font-family:'Fraunces',serif; font-weight:700; font-size:1.15em; color:#6E201E;\">Video recomendado<\u002Fh3>\n          <p style=\"margin:0 0 10px; font-size:.93em; color:#6E201E;\"><em>Inventing Improv: A Chicago Stories Special<\u002Fem> — el origen del teatro improvisado en Chicago (58:35).<\u002Fp>\n          <a href=\"https://www.youtube.com/watch?v=bQLIS1ZeNgw\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-block; padding:10px 18px; background:#8F2F2C; color:#F7F2E9; border-radius:999px; font-size:13px; font-weight:700; text-decoration:none;\">Ver en YouTube ↗<\u002Fa>\n        <\u002Farticle>\n      <\u002Fdiv>\n      <p style=\"margin:18px 0 0; padding:16px 20px; background:#EFE7D8; border-radius:12px; color:#6E201E;\">La aplicación de la improvisación teatral al análisis literario permite que la persona estudiante explore los personajes, situaciones y conflictos de la obra desde una perspectiva vivencial y creativa, profundizando en su comprensión a través de la experiencia directa.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== Sesión 2 ===== -->\n  <section id=\"sesion2\" data-screen-label=\"Sesión 2\" style=\"padding:0 20px clamp(44px,7vw,72px); scroll-margin-top:120px;\">\n    <div style=\"max-width:1080px; margin:0 auto;\">\n      <p style=\"margin:0 0 6px; font-size:11.5px; font-weight:700; letter-spacing:2.5px; color:#8F2F2C;\">SESIÓN 2 · ANTES DE LA LECTURA<\u002Fp>\n      <h2 style=\"margin: 0 0 22px; font-family: 'Fraunces',serif; font-weight: 800; font-size: clamp(26px,5.5vw,40px); color: #26211B; line-height: 54.1px\">Asociación (Activación previa a la lectura)<\u002Fh2>\n      <div style=\"display:grid; grid-template-columns:repeat(auto-fit, minmax(270px, 1fr)); gap:14px; margin:0 0 18px;\">\n        <article style=\"background:#FFFDF8; border:1px solid #D9D0C1; border-radius:14px; padding:20px;\">\n          <h3 style=\"margin:0 0 8px; font-family:'Fraunces',serif; font-weight:700; font-size:1.15em; color:#26211B;\">Palabra lanzada<\u002Fh3>\n          <p style=\"margin: 0; font-size: .95em; line-height: 24.25px\">La persona docente lanza una palabra relacionada con la obra (ej. «reino», «niñez», «libertad»). Cada estudiante responde con una palabra asociada.<\u002Fp>\n        <\u002Farticle>\n        <article style=\"background:#FFFDF8; border:1px solid #D9D0C1; border-radius:14px; padding:20px;\">\n          <h3 style=\"margin:0 0 8px; font-family:'Fraunces',serif; font-weight:700; font-size:1.15em; color:#26211B;\">Palabra coincidente<\u002Fh3>\n          <p style=\"margin: 0; font-size: .95em; line-height: 23.9px\">Por parejas, intentan decir al mismo tiempo una palabra. Si no coinciden, lo intentan de nuevo basados en las palabras dichas anteriormente.<\u002Fp>\n        <\u002Farticle>\n      <\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns:repeat(3, 1fr); gap:10px; margin:0 0 18px;\">\n        <div style=\"background:#EFE7D8; border-radius:12px; padding:14px; text-align:center;\"><p style=\"margin:0; font-family:'Fraunces',serif; font-weight:800; font-size:1.5em; color:#6E201E;\">30<\u002Fp><p style=\"margin:2px 0 0; font-size:.75em; color:#5C5446;\">Minutos por actividad<\u002Fp><\u002Fdiv>\n        <div style=\"background:#EFE7D8; border-radius:12px; padding:14px; text-align:center;\"><p style=\"margin:0; font-family:'Fraunces',serif; font-weight:800; font-size:1.5em; color:#6E201E;\">100%<\u002Fp><p style=\"margin:2px 0 0; font-size:.75em; color:#5C5446;\">Participación del grupo<\u002Fp><\u002Fdiv>\n        <div style=\"background:#EFE7D8; border-radius:12px; padding:14px; text-align:center;\"><p style=\"margin:0; font-family:'Fraunces',serif; font-weight:800; font-size:1.5em; color:#6E201E;\">2<\u002Fp><p style=\"margin:2px 0 0; font-size:.75em; color:#5C5446;\">Actividades complementarias<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <p style=\"margin:0 0 18px; padding:16px 20px; background:#EFE7D8; border-radius:12px; color:#6E201E;\"><strong>Vinculación con la obra:<\u002Fstrong> se conversa sobre qué imágenes o sentimientos surgen al pensar en un niño que no puede salir de casa. Se introducen palabras clave como «enfermedad», «carta», «rey» y «libertad».<\u002Fp>\n\n      <details open=\"{{ fichasOpen }}\" style=\"background:#FFFDF8; border:1px solid #D9D0C1; border-radius:14px; margin:0 0 10px;\">\n        <summary style=\"display:flex; align-items:center; gap:12px; padding:16px 18px;\"><span data-chev=\"1\" style=\"display:inline-block; color:#8F2F2C; font-size:11px;\">▶<\u002Fspan><span style=\"font-family:'Fraunces',serif; font-weight:700; font-size:1.1em; color:#26211B;\">Ficha del ejercicio: «Palabra lanzada»<\u002Fspan><\u002Fsummary>\n        <div style=\"padding:0 18px 18px;\">\n          <div style=\"display:grid; gap:1px; background:#EFE7D8; border:1px solid #EFE7D8; border-radius:10px; overflow:hidden; margin:0 0 14px;\">\n            <div style=\"background:#FFFDF8; padding:11px 14px; display:grid; grid-template-columns:minmax(110px,170px) 1fr; gap:12px;\"><strong style=\"font-size:.85em; color:#6E201E;\">Tipo<\u002Fstrong><span style=\"font-size:.93em;\">Improvisación verbal – Calentamiento grupal<\u002Fspan><\u002Fdiv>\n            <div style=\"background:#FFFDF8; padding:11px 14px; display:grid; grid-template-columns:minmax(110px,170px) 1fr; gap:12px;\"><strong style=\"font-size:.85em; color:#6E201E;\">Objetivo pedagógico<\u002Fstrong><span style=\"font-size:.93em;\">Estimular la expresión espontánea, liberar bloqueos verbales, fomentar la escucha activa y la asociación libre de ideas<\u002Fspan><\u002Fdiv>\n            <div style=\"background:#FFFDF8; padding:11px 14px; display:grid; grid-template-columns:minmax(110px,170px) 1fr; gap:12px;\"><strong style=\"font-size:.85em; color:#6E201E;\">Aplicación en el aula<\u002Fstrong><span style=\"font-size:.93em;\">Ideal como actividad de apertura antes de leer o interpretar una escena dramática. Activa el lenguaje, rompe el hielo y sintoniza al grupo<\u002Fspan><\u002Fdiv>\n            <div style=\"background:#FFFDF8; padding:11px 14px; display:grid; grid-template-columns:minmax(110px,170px) 1fr; gap:12px;\"><strong style=\"font-size:.85em; color:#6E201E;\">Vinculación con la obra<\u002Fstrong><span style=\"font-size:.93em;\">Favorece la expresión oral, la fluidez verbal, la creatividad lingüística y el acceso lúdico al análisis de personajes, temas y conflictos<\u002Fspan><\u002Fdiv>\n            <div style=\"background:#FFFDF8; padding:11px 14px; display:grid; grid-template-columns:minmax(110px,170px) 1fr; gap:12px;\"><strong style=\"font-size:.85em; color:#6E201E;\">Materiales<\u002Fstrong><span style=\"font-size:.93em;\">No requiere materiales físicos<\u002Fspan><\u002Fdiv>\n            <div style=\"background:#FFFDF8; padding:11px 14px; display:grid; grid-template-columns:minmax(110px,170px) 1fr; gap:12px;\"><strong style=\"font-size:.85em; color:#6E201E;\">Variaciones útiles<\u002Fstrong><span style=\"font-size:.93em;\">Asociaciones emocionales (palabras que evocan sentimientos) · Asociaciones temáticas (relacionadas con la obra o escena a trabajar)<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <h4 style=\"margin:0 0 10px; font-family:'Fraunces',serif; font-weight:700; font-size:1.05em; color:#26211B;\">Instrucciones del juego — paso a paso<\u002Fh4>\n          <ol style=\"margin:0 0 12px; padding:0 0 0 20px; display:grid; gap:8px; font-size:.95em;\">\n            <li><strong>Formación del grupo:<\u002Fstrong> el grupo se coloca en círculo, dejando un espacio libre al centro para poder observarse con claridad.<\u002Fli>\n            <li><strong>Inicio del juego:<\u002Fstrong> la persona docente lanza una palabra relacionada con la obra, como «reino», «cartero» o «libertad», mientras hace el gesto de lanzarla con la mano, como si arrojara una pelota imaginaria a otra persona del círculo.<\u002Fli>\n            <li><strong>Cadena de asociaciones:<\u002Fstrong> quien recibe la palabra responde de inmediato con otra que asocie libremente. El juego continúa con ritmo fluido. Ejemplo: Docente: «Rey» → Estudiante 1: «Reino» → Estudiante 2: «Castillo» → Estudiante 3: «Príncipe».<\u002Fli>\n            <li><strong>Ritmo grupal:<\u002Fstrong> se procura mantener un ritmo constante, evitando pausas largas. La respuesta debe surgir de manera espontánea y sin censura, fomentando la creatividad y la atención colectiva.<\u002Fli>\n          <\u002Fol>\n          <div style=\"margin:0 0 14px;\">\n            <p style=\"margin:0 0 6px; font-size:11px; font-weight:700; letter-spacing:1.5px; color:#8F2F2C;\">IMAGEN DE REFERENCIA DEL EJERCICIO<\u002Fp>\n            <div style=\"display:grid; grid-template-columns:1fr; gap:12px;\">\n              <x-import component-from-global-scope=\"image-slot\" id=\"img-palabra-lanzada-1\" shape=\"rounded\" radius=\"12\" placeholder=\"Arrastra o sube tu imagen aquí\" style=\"width:100%; height:230px;\" hint-size=\"100%,230px\"><\u002Fx-import>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <p style=\"margin:0; padding:12px 14px; background:#EFE7D8; border-radius:10px; font-size:.93em; color:#6E201E;\"><strong>Cierre reflexivo:<\u002Fstrong> ¿Qué temas o emociones se repitieron? ¿Qué relación tienen con la obra <em>El Cartero del Rey<\u002Fem>? ¿Qué nuevas ideas o imágenes aparecieron durante el ejercicio?<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdetails>\n\n      <details open=\"{{ fichasOpen }}\" style=\"background:#FFFDF8; border:1px solid #D9D0C1; border-radius:14px;\">\n        <summary style=\"display:flex; align-items:center; gap:12px; padding:16px 18px;\"><span data-chev=\"1\" style=\"display:inline-block; color:#8F2F2C; font-size:11px;\">▶<\u002Fspan><span style=\"font-family:'Fraunces',serif; font-weight:700; font-size:1.1em; color:#26211B;\">Ficha del ejercicio: «Palabra coincidente»<\u002Fspan><\u002Fsummary>\n        <div style=\"padding:0 18px 18px;\">\n          <div style=\"display:grid; gap:1px; background:#EFE7D8; border:1px solid #EFE7D8; border-radius:10px; overflow:hidden; margin:0 0 14px;\">\n            <div style=\"background:#FFFDF8; padding:11px 14px; display:grid; grid-template-columns:minmax(110px,170px) 1fr; gap:12px;\"><strong style=\"font-size:.85em; color:#6E201E;\">Tipo<\u002Fstrong><span style=\"font-size:.93em;\">Improvisación verbal – Asociación simultánea<\u002Fspan><\u002Fdiv>\n            <div style=\"background:#FFFDF8; padding:11px 14px; display:grid; grid-template-columns:minmax(110px,170px) 1fr; gap:12px;\"><strong style=\"font-size:.85em; color:#6E201E;\">Objetivo pedagógico<\u002Fstrong><span style=\"font-size:.93em;\">Fomentar la conexión intuitiva y la sincronía mental entre pares, desarrollando creatividad y pensamiento asociativo<\u002Fspan><\u002Fdiv>\n            <div style=\"background:#FFFDF8; padding:11px 14px; display:grid; grid-template-columns:minmax(110px,170px) 1fr; gap:12px;\"><strong style=\"font-size:.85em; color:#6E201E;\">Aplicación en el aula<\u002Fstrong><span style=\"font-size:.93em;\">Útil para generar cohesión grupal y conexión antes de una escena o una práctica interpretativa del texto<\u002Fspan><\u002Fdiv>\n            <div style=\"background:#FFFDF8; padding:11px 14px; display:grid; grid-template-columns:minmax(110px,170px) 1fr; gap:12px;\"><strong style=\"font-size:.85em; color:#6E201E;\">Vinculación con la obra<\u002Fstrong><span style=\"font-size:.93em;\">Estimula la cooperación, el pensamiento creativo y la sensibilidad lingüística dentro del trabajo literario colectivo<\u002Fspan><\u002Fdiv>\n            <div style=\"background:#FFFDF8; padding:11px 14px; display:grid; grid-template-columns:minmax(110px,170px) 1fr; gap:12px;\"><strong style=\"font-size:.85em; color:#6E201E;\">Materiales<\u002Fstrong><span style=\"font-size:.93em;\">No requiere materiales físicos<\u002Fspan><\u002Fdiv>\n            <div style=\"background:#FFFDF8; padding:11px 14px; display:grid; grid-template-columns:minmax(110px,170px) 1fr; gap:12px;\"><strong style=\"font-size:.85em; color:#6E201E;\">Variaciones útiles<\u002Fstrong><span style=\"font-size:.93em;\">Temáticas: se usa un campo semántico determinado · Emocionales: se busca coincidir en sensaciones como tristeza, esperanza, etc.<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <h4 style=\"margin:0 0 10px; font-family:'Fraunces',serif; font-weight:700; font-size:1.05em; color:#26211B;\">Instrucciones del juego — paso a paso<\u002Fh4>\n          <ol style=\"margin:0 0 12px; padding:0 0 0 20px; display:grid; gap:8px; font-size:.95em;\">\n            <li><strong>Formación del grupo:<\u002Fstrong> la clase se organiza en un círculo en el centro del aula, con espacio suficiente para observarse claramente.<\u002Fli>\n            <li><strong>Inicio del juego:<\u002Fstrong> la persona docente pregunta a dos estudiantes la primera palabra que se les venga a la mente. Por ejemplo: Persona A: «Sol» · Persona B: «Carta».<\u002Fli>\n            <li><strong>Búsqueda de conexión:<\u002Fstrong> a la cuenta de tres, ambas personas dicen en voz alta, mirándose a los ojos, una palabra que relacione ambas ideas — por ejemplo «Esperanza» o «Imaginación». La dinámica continúa hasta que dos personas logren decir la misma palabra al mismo tiempo.<\u002Fli>\n            <li><strong>Coincidencia final:<\u002Fstrong> cuando dos participantes coinciden, el grupo celebra y se inicia una nueva partida con otra pareja.<\u002Fli>\n          <\u002Fol>\n          <div style=\"margin:0 0 14px;\">\n            <p style=\"margin:0 0 6px; font-size:11px; font-weight:700; letter-spacing:1.5px; color:#8F2F2C;\">IMAGEN DE REFERENCIA DEL EJERCICIO<\u002Fp>\n            <div style=\"display:grid; grid-template-columns:repeat(auto-fit, minmax(150px, 1fr)); gap:12px;\">\n              <x-import component-from-global-scope=\"image-slot\" id=\"img-palabra-coincidente-1\" shape=\"rounded\" radius=\"12\" placeholder=\"Arrastra o sube tu imagen aquí\" style=\"width:100%; height:180px;\" hint-size=\"100%,180px\"><\u002Fx-import>\n              <x-import component-from-global-scope=\"image-slot\" id=\"img-palabra-coincidente-2\" shape=\"rounded\" radius=\"12\" placeholder=\"Arrastra o sube tu imagen aquí\" style=\"width:100%; height:180px;\" hint-size=\"100%,180px\"><\u002Fx-import>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <p style=\"margin:0; padding:12px 14px; background:#EFE7D8; border-radius:10px; font-size:.93em; color:#6E201E;\"><strong>Cierre reflexivo:<\u002Fstrong> ¿Qué valores se reflejan en la coincidencia y la escucha? ¿Qué palabra del juego representa mejor el mensaje de la obra? ¿Qué simboliza para Amal la idea de esperanza?<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdetails>\n\n      <div style=\"margin:16px 0 0;\">\n        <label for=\"ta-s2\" style=\"display:block; margin:0 0 6px; font-size:11.5px; font-weight:700; letter-spacing:1.5px; color:#8F2F2C;\">MIS NOTAS DE ESTA SESIÓN<\u002Flabel>\n        <textarea id=\"ta-s2\" value=\"{{ notes.s2 }}\" sc-camel-on-change=\"{{ noteOn.s2 }}\" placeholder=\"Observaciones, adaptaciones, resultados…\" style=\"width:100%; box-sizing:border-box; min-height:90px; padding:14px; border:1px solid #D9D0C1; border-radius:10px; background:#FFFDF8; color:#26211B; font:inherit; line-height:1.6; resize:vertical;\"><\u002Ftextarea>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== Sesión 3 ===== -->\n  <section id=\"sesion3\" data-screen-label=\"Sesión 3\" style=\"padding:0 20px clamp(44px,7vw,72px); scroll-margin-top:120px;\">\n    <div style=\"max-width:1080px; margin:0 auto;\">\n      <p style=\"margin:0 0 6px; font-size:11.5px; font-weight:700; letter-spacing:2.5px; color:#8F2F2C;\">SESIÓN 3 · DURANTE LA LECTURA<\u002Fp>\n      <h2 style=\"margin: 0 0 14px; font-family: 'Fraunces',serif; font-weight: 800; font-size: clamp(26px,5.5vw,40px); color: #26211B; line-height: 54.05px\">Escucha (Durante la lectura)<\u002Fh2>\n      <p style=\"margin:0 0 10px; max-width:70ch;\">Durante esta sesión, la persona estudiante desarrollará habilidades de escucha profunda que le permitan comprender mejor las relaciones entre los personajes, sus motivaciones y los conflictos que se presentan en la obra. La improvisación se convierte en una herramienta para explorar diferentes interpretaciones del texto.<\u002Fp>\n      <p style=\"margin:0 0 22px; max-width:70ch;\">La escucha activa es un pilar fundamental de la técnica de la improvisación teatral. Estos ejercicios desarrollarán la capacidad de atender a los detalles, comprender las intenciones comunicativas y construir significados compartidos.<\u002Fp>\n      <div style=\"display:grid; grid-template-columns:repeat(auto-fit, minmax(270px, 1fr)); gap:14px; margin:0 0 18px;\">\n        <article style=\"background:#FFFDF8; border:1px solid #D9D0C1; border-radius:14px; padding:20px;\">\n          <h3 style=\"margin:0 0 8px; font-family:'Fraunces',serif; font-weight:700; font-size:1.15em; color:#26211B;\">Yo digo/dije porque él/ella dijo<\u002Fh3>\n          <p style=\"margin: 0; font-size: .95em; line-height: 27.8px\">Se selecciona una oración en relación a la obra. Estudiantes empiezan conforme a la estructura, explicando por qué dijeron lo que dijeron.<\u002Fp>\n        <\u002Farticle>\n        <article style=\"background:#FFFDF8; border:1px solid #D9D0C1; border-radius:14px; padding:20px;\">\n          <h3 style=\"margin:0 0 8px; font-family:'Fraunces',serif; font-weight:700; font-size:1.15em; color:#26211B;\">Historia de una palabra<\u002Fh3>\n          <p style=\"margin: 0; font-size: .95em; line-height: 28.15px\">Se realiza una narración improvisada por palabra de cada estudiante en relación a la obra dramática sobre lo que podría pasar. Por ejemplo, si el rey realmente llega.<\u002Fp>\n        <\u002Farticle>\n      <\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns:repeat(3, 1fr); gap:10px; margin:0 0 18px;\">\n        <div style=\"background:#EFE7D8; border-radius:12px; padding:14px; text-align:center;\"><p style=\"margin:0; font-family:'Fraunces',serif; font-weight:800; font-size:1.5em; color:#6E201E;\">30<\u002Fp><p style=\"margin:2px 0 0; font-size:.75em; color:#5C5446;\">Minutos por actividad<\u002Fp><\u002Fdiv>\n        <div style=\"background:#EFE7D8; border-radius:12px; padding:14px; text-align:center;\"><p style=\"margin:0; font-family:'Fraunces',serif; font-weight:800; font-size:1.5em; color:#6E201E;\">100%<\u002Fp><p style=\"margin:2px 0 0; font-size:.75em; color:#5C5446;\">Participación del grupo<\u002Fp><\u002Fdiv>\n        <div style=\"background:#EFE7D8; border-radius:12px; padding:14px; text-align:center;\"><p style=\"margin:0; font-family:'Fraunces',serif; font-weight:800; font-size:1.5em; color:#6E201E;\">2<\u002Fp><p style=\"margin:2px 0 0; font-size:.75em; color:#5C5446;\">Actividades complementarias<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <p style=\"margin:0 0 18px; padding:16px 20px; background:#EFE7D8; border-radius:12px; color:#6E201E;\"><strong>Vinculación con la obra:<\u002Fstrong> se analiza el diálogo entre Amal y el médico o el cartero. Se improvisan nuevas líneas que podrían decirse desde la perspectiva emocional de los personajes. Se profundiza en las motivaciones y sentimientos de cada personaje.<\u002Fp>\n\n      <details open=\"{{ fichasOpen }}\" style=\"background:#FFFDF8; border:1px solid #D9D0C1; border-radius:14px; margin:0 0 10px;\">\n        <summary style=\"display:flex; align-items:center; gap:12px; padding:16px 18px;\"><span data-chev=\"1\" style=\"display:inline-block; color:#8F2F2C; font-size:11px;\">▶<\u002Fspan><span style=\"font-family:'Fraunces',serif; font-weight:700; font-size:1.1em; color:#26211B;\">Ficha del ejercicio: «Yo digo/dije porque él/ella dijo»<\u002Fspan><\u002Fsummary>\n        <div style=\"padding:0 18px 18px;\">\n          <div style=\"display:grid; gap:1px; background:#EFE7D8; border:1px solid #EFE7D8; border-radius:10px; overflow:hidden; margin:0 0 14px;\">\n            <div style=\"background:#FFFDF8; padding:11px 14px; display:grid; grid-template-columns:minmax(110px,170px) 1fr; gap:12px;\"><strong style=\"font-size:.85em; color:#6E201E;\">Tipo<\u002Fstrong><span style=\"font-size:.93em;\">Improvisación verbal – Escucha activa<\u002Fspan><\u002Fdiv>\n            <div style=\"background:#FFFDF8; padding:11px 14px; display:grid; grid-template-columns:minmax(110px,170px) 1fr; gap:12px;\"><strong style=\"font-size:.85em; color:#6E201E;\">Objetivo pedagógico<\u002Fstrong><span style=\"font-size:.93em;\">Fomentar la escucha profunda, la comprensión de causas y efectos en el discurso, y el vínculo entre personajes<\u002Fspan><\u002Fdiv>\n            <div style=\"background:#FFFDF8; padding:11px 14px; display:grid; grid-template-columns:minmax(110px,170px) 1fr; gap:12px;\"><strong style=\"font-size:.85em; color:#6E201E;\">Aplicación en el aula<\u002Fstrong><span style=\"font-size:.93em;\">Útil durante el análisis de diálogos. Clave para profundizar en las intenciones y respuestas de los personajes<\u002Fspan><\u002Fdiv>\n            <div style=\"background:#FFFDF8; padding:11px 14px; display:grid; grid-template-columns:minmax(110px,170px) 1fr; gap:12px;\"><strong style=\"font-size:.85em; color:#6E201E;\">Vinculación con la obra<\u002Fstrong><span style=\"font-size:.93em;\">Potencia la comprensión lectora, el análisis de relaciones y la argumentación desde el texto<\u002Fspan><\u002Fdiv>\n            <div style=\"background:#FFFDF8; padding:11px 14px; display:grid; grid-template-columns:minmax(110px,170px) 1fr; gap:12px;\"><strong style=\"font-size:.85em; color:#6E201E;\">Materiales<\u002Fstrong><span style=\"font-size:.93em;\">Fragmentos breves de diálogos del texto<\u002Fspan><\u002Fdiv>\n            <div style=\"background:#FFFDF8; padding:11px 14px; display:grid; grid-template-columns:minmax(110px,170px) 1fr; gap:12px;\"><strong style=\"font-size:.85em; color:#6E201E;\">Variaciones útiles<\u002Fstrong><span style=\"font-size:.93em;\">Invertir roles y palabras · Improvisar finales alternativos de una escena según respuestas nuevas<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <h4 style=\"margin:0 0 10px; font-family:'Fraunces',serif; font-weight:700; font-size:1.05em; color:#26211B;\">Instrucciones del juego — paso a paso<\u002Fh4>\n          <ol style=\"margin:0 0 12px; padding:0 0 0 20px; display:grid; gap:8px; font-size:.95em;\">\n            <li><strong>Formación del grupo:<\u002Fstrong> se organiza al grupo en un círculo en parejas o tríos; comienzan uno por uno con suficiente espacio para observarse e interactuar.<\u002Fli>\n            <li><strong>Inicio del juego:<\u002Fstrong> las personas A y B escogen una escena para dialogar frente a la clase (ejemplo: Acto Primero, Escena Novena). Persona A: «¡Espera un poquito!, ¿quieres?» → Persona B: «Yo digo “¡no puedo, no tengo tiempo, es muy tarde!” porque él/ella dijo “¡espera un poquito!, ¿quieres?”».<\u002Fli>\n            <li><strong>Búsqueda de conexión:<\u002Fstrong> la dinámica continúa alternando roles, manteniendo la estructura «Yo digo ___ porque él/ella dijo ___» (o «Yo dije ___ porque él/ella dijo ___» al retomar). Cada diálogo continúa con el personaje de la escena escogida, de forma recíproca e interactiva.<\u002Fli>\n            <li><strong>Continuidad del diálogo:<\u002Fstrong> la secuencia se mantiene hasta el último diálogo de la escena. Conviene haber leído la escena unas tres veces; si el grupo olvida los diálogos, la persona docente ayuda a recordar la siguiente oración para no detener el juego.<\u002Fli>\n          <\u002Fol>\n          <div style=\"margin:0 0 14px;\">\n            <p style=\"margin:0 0 6px; font-size:11px; font-weight:700; letter-spacing:1.5px; color:#8F2F2C;\">IMAGEN DE REFERENCIA DEL EJERCICIO<\u002Fp>\n            <div style=\"display:grid; grid-template-columns:repeat(auto-fit, minmax(150px, 1fr)); gap:12px;\">\n              <x-import component-from-global-scope=\"image-slot\" id=\"img-yo-digo-1\" shape=\"rounded\" radius=\"12\" placeholder=\"Arrastra o sube tu imagen aquí\" style=\"width:100%; height:180px;\" hint-size=\"100%,180px\"><\u002Fx-import>\n              <x-import component-from-global-scope=\"image-slot\" id=\"img-yo-digo-2\" shape=\"rounded\" radius=\"12\" placeholder=\"Arrastra o sube tu imagen aquí\" style=\"width:100%; height:180px;\" hint-size=\"100%,180px\"><\u002Fx-import>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <p style=\"margin:0; padding:12px 14px; background:#EFE7D8; border-radius:10px; font-size:.93em; color:#6E201E;\"><strong>Cierre reflexivo:<\u002Fstrong> ¿Fue sencillo o difícil encontrar la conexión entre las palabras? ¿Cómo se relaciona la última palabra de la cadena con el conflicto de Amal? ¿Qué aprendimos sobre la importancia de la escucha en los diálogos de la obra?<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdetails>\n\n      <details open=\"{{ fichasOpen }}\" style=\"background:#FFFDF8; border:1px solid #D9D0C1; border-radius:14px;\">\n        <summary style=\"display:flex; align-items:center; gap:12px; padding:16px 18px;\"><span data-chev=\"1\" style=\"display:inline-block; color:#8F2F2C; font-size:11px;\">▶<\u002Fspan><span style=\"font-family:'Fraunces',serif; font-weight:700; font-size:1.1em; color:#26211B;\">Ficha del ejercicio: «Historia de una palabra»<\u002Fspan><\u002Fsummary>\n        <div style=\"padding:0 18px 18px;\">\n          <div style=\"display:grid; gap:1px; background:#EFE7D8; border:1px solid #EFE7D8; border-radius:10px; overflow:hidden; margin:0 0 14px;\">\n            <div style=\"background:#FFFDF8; padding:11px 14px; display:grid; grid-template-columns:minmax(110px,170px) 1fr; gap:12px;\"><strong style=\"font-size:.85em; color:#6E201E;\">Tipo<\u002Fstrong><span style=\"font-size:.93em;\">Narración colectiva – Improvisación grupal<\u002Fspan><\u002Fdiv>\n            <div style=\"background:#FFFDF8; padding:11px 14px; display:grid; grid-template-columns:minmax(110px,170px) 1fr; gap:12px;\"><strong style=\"font-size:.85em; color:#6E201E;\">Objetivo pedagógico<\u002Fstrong><span style=\"font-size:.93em;\">Desarrollar la colaboración narrativa, la coherencia secuencial y la creatividad colectiva<\u002Fspan><\u002Fdiv>\n            <div style=\"background:#FFFDF8; padding:11px 14px; display:grid; grid-template-columns:minmax(110px,170px) 1fr; gap:12px;\"><strong style=\"font-size:.85em; color:#6E201E;\">Aplicación en el aula<\u002Fstrong><span style=\"font-size:.93em;\">Ideal para imaginar escenas complementarias o nuevas secuencias dentro de la obra leída<\u002Fspan><\u002Fdiv>\n            <div style=\"background:#FFFDF8; padding:11px 14px; display:grid; grid-template-columns:minmax(110px,170px) 1fr; gap:12px;\"><strong style=\"font-size:.85em; color:#6E201E;\">Vinculación con la obra<\u002Fstrong><span style=\"font-size:.93em;\">Refuerza la comprensión de trama, el desarrollo narrativo y la expresión oral colaborativa<\u002Fspan><\u002Fdiv>\n            <div style=\"background:#FFFDF8; padding:11px 14px; display:grid; grid-template-columns:minmax(110px,170px) 1fr; gap:12px;\"><strong style=\"font-size:.85em; color:#6E201E;\">Materiales<\u002Fstrong><span style=\"font-size:.93em;\">No requiere materiales físicos<\u002Fspan><\u002Fdiv>\n            <div style=\"background:#FFFDF8; padding:11px 14px; display:grid; grid-template-columns:minmax(110px,170px) 1fr; gap:12px;\"><strong style=\"font-size:.85em; color:#6E201E;\">Variaciones útiles<\u002Fstrong><span style=\"font-size:.93em;\">Incluir palabras clave de la obra · Girar la obra a distintos géneros (comedia, tragedia, etc.)<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <h4 style=\"margin:0 0 10px; font-family:'Fraunces',serif; font-weight:700; font-size:1.05em; color:#26211B;\">Instrucciones del juego — paso a paso<\u002Fh4>\n          <ol style=\"margin:0 0 12px; padding:0 0 0 20px; display:grid; gap:8px; font-size:.95em;\">\n            <li><strong>Formación del grupo:<\u002Fstrong> se organiza un círculo donde todos y todas puedan verse, para mantener contacto visual y concentración grupal.<\u002Fli>\n            <li><strong>Inicio del juego:<\u002Fstrong> la persona docente lanza una palabra clave de la obra: «Ventana», «Esperanza», «Ausencia» o «Libertad». Ejemplo con «Ventana»: Estudiante 1: «Amal» → Estudiante 2: «miraba» → Estudiante 3: «la» → Estudiante 4: «ventana».<\u002Fli>\n            <li><strong>Búsqueda de conexión:<\u002Fstrong> cada estudiante introduce una nueva palabra que dé continuidad lógica usando la última mencionada. La historia crece orgánicamente, guiada por la escucha y la imaginación colectiva.<\u002Fli>\n            <li><strong>Cierre de la historia:<\u002Fstrong> se desarrolla hasta que exista una estructura narrativa reconocible (inicio, desarrollo y cierre). Opcional: una persona asume el rol de narradora y las demás recrean «Amal miraba la ventana». El reto es mantener la coherencia narrativa a pesar de las múltiples voces.<\u002Fli>\n          <\u002Fol>\n          <div style=\"margin:0 0 14px;\">\n            <p style=\"margin:0 0 6px; font-size:11px; font-weight:700; letter-spacing:1.5px; color:#8F2F2C;\">IMAGEN DE REFERENCIA DEL EJERCICIO<\u002Fp>\n            <div style=\"display:grid; grid-template-columns:1fr; gap:12px;\">\n              <x-import component-from-global-scope=\"image-slot\" id=\"img-historia-palabra-1\" shape=\"rounded\" radius=\"12\" placeholder=\"Arrastra o sube tu imagen aquí\" style=\"width:100%; height:230px;\" hint-size=\"100%,230px\"><\u002Fx-import>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <p style=\"margin:0; padding:12px 14px; background:#EFE7D8; border-radius:10px; font-size:.93em; color:#6E201E;\"><strong>Cierre reflexivo:<\u002Fstrong> ¿Qué caminos tomó la historia a partir de la palabra inicial? ¿Se mantuvo la esencia o el tono de la obra de Tagore? ¿Cómo influyó la última palabra del compañero o compañera en la creación de la nueva oración?<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdetails>\n\n      <div style=\"margin:16px 0 0;\">\n        <label for=\"ta-s3\" style=\"display:block; margin:0 0 6px; font-size:11.5px; font-weight:700; letter-spacing:1.5px; color:#8F2F2C;\">MIS NOTAS DE ESTA SESIÓN<\u002Flabel>\n        <textarea id=\"ta-s3\" value=\"{{ notes.s3 }}\" sc-camel-on-change=\"{{ noteOn.s3 }}\" placeholder=\"Observaciones, adaptaciones, resultados…\" style=\"width:100%; box-sizing:border-box; min-height:90px; padding:14px; border:1px solid #D9D0C1; border-radius:10px; background:#FFFDF8; color:#26211B; font:inherit; line-height:1.6; resize:vertical;\"><\u002Ftextarea>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== Sesión 4 ===== -->\n  <section id=\"sesion4\" data-screen-label=\"Sesión 4\" style=\"padding:0 20px clamp(44px,7vw,72px); scroll-margin-top:120px;\">\n    <div style=\"max-width:1080px; margin:0 auto;\">\n      <p style=\"margin:0 0 6px; font-size:11.5px; font-weight:700; letter-spacing:2.5px; color:#8F2F2C;\">SESIÓN 4 · EXPLORACIÓN DE PERSONAJES<\u002Fp>\n      <h2 style=\"margin: 0 0 14px; font-family: 'Fraunces',serif; font-weight: 800; font-size: clamp(26px,5.5vw,40px); color: #26211B; line-height: 53.8px\">Aceptación (Exploración de personajes)<\u002Fh2>\n      <p style=\"margin:0 0 10px; max-width:70ch;\">Utilizando uno de los conceptos de la técnica de la improvisación teatral: la aceptación, las personas estudiantes, en pequeños grupos, improvisarán escenas cortas con personajes de «El cartero del rey». Se les pedirá que exploren las emociones, motivaciones y reacciones de Amal, el cartero, el médico, el rey, el padre, etc., aceptando las propuestas de los y las demás para desarrollar la escena. Por ejemplo: ¿Qué pasaría si el cartero trajera una carta inesperada de un lugar que Amal no conoce?<\u002Fp>\n      <p style=\"margin:0 0 22px; max-width:70ch;\">La aceptación («sí y…») es la clave para que la improvisación fluya. En esta sesión, las personas estudiantes aprenderán a construir la realidad escénica aceptando las propuestas de sus compañeros o compañeras y explorando la riqueza de los personajes de Tagore.<\u002Fp>\n      <div style=\"display:grid; grid-template-columns:repeat(auto-fit, minmax(270px, 1fr)); gap:14px; margin:0 0 18px;\">\n        <article style=\"background:#FFFDF8; border:1px solid #D9D0C1; border-radius:14px; padding:20px;\">\n          <h3 style=\"margin:0 0 8px; font-family:'Fraunces',serif; font-weight:700; font-size:1.15em; color:#26211B;\">Guardar el cofrecito<\u002Fh3>\n          <p style=\"margin: 0; font-size: .95em; line-height: 27.95px\">En parejas, uno o una debe aceptar la intención y diálogo del otro o la otra. Responder con el cuerpo y reaccionar enfrente de los y las compañeras, y después escoger a la siguiente persona con una nueva intención y diálogo (ej. «¡Pobre criatura! Tenerlo encerrado todo el día… Eso es demasiado…», «¡Eso sí que sería divertido!»).<\u002Fp>\n        <\u002Farticle>\n        <article style=\"background:#FFFDF8; border:1px solid #D9D0C1; border-radius:14px; padding:20px;\">\n          <h3 style=\"margin:0 0 8px; font-family:'Fraunces',serif; font-weight:700; font-size:1.15em; color:#26211B;\">Entonces, ¿qué?<\u002Fh3>\n          <p style=\"margin: 0; font-size: .95em; line-height: 27.85px\">La persona estudiante propone una oración («Amal se ponía en la ventana»). El compañero o la compañera acciona y después debe responder con un «Entonces, ¿qué?» y luego continúa la oración («y se puso a llorar») y así sucesivamente hasta que intercambian de roles.<\u002Fp>\n        <\u002Farticle>\n      <\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns:repeat(3, 1fr); gap:10px; margin:0 0 18px;\">\n        <div style=\"background:#EFE7D8; border-radius:12px; padding:14px; text-align:center;\"><p style=\"margin:0; font-family:'Fraunces',serif; font-weight:800; font-size:1.5em;
