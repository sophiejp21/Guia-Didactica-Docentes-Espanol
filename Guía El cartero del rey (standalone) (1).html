color:#6E201E;\">30<\u002Fp><p style=\"margin:2px 0 0; font-size:.75em; color:#5C5446;\">Minutos por actividad<\u002Fp><\u002Fdiv>\n        <div style=\"background:#EFE7D8; border-radius:12px; padding:14px; text-align:center;\"><p style=\"margin:0; font-family:'Fraunces',serif; font-weight:800; font-size:1.5em; color:#6E201E;\">100%<\u002Fp><p style=\"margin:2px 0 0; font-size:.75em; color:#5C5446;\">Participación del grupo<\u002Fp><\u002Fdiv>\n        <div style=\"background:#EFE7D8; border-radius:12px; padding:14px; text-align:center;\"><p style=\"margin:0; font-family:'Fraunces',serif; font-weight:800; font-size:1.5em; color:#6E201E;\">2<\u002Fp><p style=\"margin:2px 0 0; font-size:.75em; color:#5C5446;\">Actividades complementarias<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <p style=\"margin:0 0 18px; padding:16px 20px; background:#EFE7D8; border-radius:12px; color:#6E201E;\"><strong>Vinculación con la obra:<\u002Fstrong> crear objetos invisibles (el balcón, una carta, el camino) y reaccionar a ellos como si fueran reales, fomentando la imaginación compartida y la aceptación de la realidad escénica.<\u002Fp>\n\n      <details open=\"{{ fichasOpen }}\" style=\"background:#FFFDF8; border:1px solid #D9D0C1; border-radius:14px; margin:0 0 10px;\">\n        <summary style=\"display:flex; align-items:center; gap:12px; padding:16px 18px;\"><span data-chev=\"1\" style=\"display:inline-block; color:#8F2F2C; font-size:11px;\">▶<\u002Fspan><span style=\"font-family:'Fraunces',serif; font-weight:700; font-size:1.1em; color:#26211B;\">Ficha del ejercicio: «Guardar el cofrecito»<\u002Fspan><\u002Fsummary>\n        <div style=\"padding:0 18px 18px;\">\n          <div style=\"display:grid; gap:1px; background:#EFE7D8; border:1px solid #EFE7D8; border-radius:10px; overflow:hidden; margin:0 0 14px;\">\n            <div style=\"background:#FFFDF8; padding:11px 14px; display:grid; grid-template-columns:minmax(110px,170px) 1fr; gap:12px;\"><strong style=\"font-size:.85em; color:#6E201E;\">Tipo<\u002Fstrong><span style=\"font-size:.93em;\">Improvisación de diálogos imaginarios – Escucha y aceptación<\u002Fspan><\u002Fdiv>\n            <div style=\"background:#FFFDF8; padding:11px 14px; display:grid; grid-template-columns:minmax(110px,170px) 1fr; gap:12px;\"><strong style=\"font-size:.85em; color:#6E201E;\">Objetivo pedagógico<\u002Fstrong><span style=\"font-size:.93em;\">Estimular la imaginación, la curiosidad y la aceptación del juego compartido<\u002Fspan><\u002Fdiv>\n            <div style=\"background:#FFFDF8; padding:11px 14px; display:grid; grid-template-columns:minmax(110px,170px) 1fr; gap:12px;\"><strong style=\"font-size:.85em; color:#6E201E;\">Aplicación en el aula<\u002Fstrong><span style=\"font-size:.93em;\">Sirve como metáfora para aceptar lo recibido simbólicamente y construir colectivamente<\u002Fspan><\u002Fdiv>\n            <div style=\"background:#FFFDF8; padding:11px 14px; display:grid; grid-template-columns:minmax(110px,170px) 1fr; gap:12px;\"><strong style=\"font-size:.85em; color:#6E201E;\">Vinculación con la obra<\u002Fstrong><span style=\"font-size:.93em;\">Fomenta la participación, la imaginación creativa y el trabajo en equipo<\u002Fspan><\u002Fdiv>\n            <div style=\"background:#FFFDF8; padding:11px 14px; display:grid; grid-template-columns:minmax(110px,170px) 1fr; gap:12px;\"><strong style=\"font-size:.85em; color:#6E201E;\">Materiales<\u002Fstrong><span style=\"font-size:.93em;\">No requiere materiales físicos<\u002Fspan><\u002Fdiv>\n            <div style=\"background:#FFFDF8; padding:11px 14px; display:grid; grid-template-columns:minmax(110px,170px) 1fr; gap:12px;\"><strong style=\"font-size:.85em; color:#6E201E;\">Variaciones útiles<\u002Fstrong><span style=\"font-size:.93em;\">Sustituir el diálogo por un sentimiento o valor del personaje, por ejemplo: «Aquí está la esperanza de Amal» o «Aquí está la impaciencia de Madav», eligiendo un lugar simbólico del cuerpo donde «guardarlo» (corazón, cabeza, garganta)<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <h4 style=\"margin:0 0 10px; font-family:'Fraunces',serif; font-weight:700; font-size:1.05em; color:#26211B;\">Instrucciones del juego — paso a paso<\u002Fh4>\n          <ol style=\"margin:0 0 12px; padding:0 0 0 20px; display:grid; gap:8px; font-size:.95em;\">\n            <li><strong>Formación del grupo:<\u002Fstrong> en un círculo, dos personas pasan al frente de todos.<\u002Fli>\n            <li><strong>Inicio del juego:<\u002Fstrong> la persona A dice el diálogo que haya escogido al oído de la persona B, en modo personaje, con tono e intención. Ejemplos: (Madhav a El médico): «¡Pobre criatura! Tenerlo encerrado todo el día… Eso es demasiado…» · (Amal a Madhav): «¡Eso sí que sería divertido!».<\u002Fli>\n            <li><strong>Adivinanza grupal:<\u002Fstrong> quienes observan deben adivinar qué personaje es la persona B que recibe la acción y reacciona dentro de la escena: ¿Qué fue lo que le dijo? ¿Quiénes son los personajes? Así sucesivamente con cada pareja que pasa al frente.<\u002Fli>\n            <li><strong>Revelación:<\u002Fstrong> al finalizar, en círculo comparten qué personajes eran; si no lo adivinan, la persona revela con una acción específica del personaje (solo acción, sin palabras) quién es realmente. Lo importante es generar curiosidad y conectar con las emociones del otro o la otra: es una experiencia sensorial de cada participante.<\u002Fli>\n          <\u002Fol>\n          <div style=\"margin:0 0 14px;\">\n            <p style=\"margin:0 0 6px; font-size:11px; font-weight:700; letter-spacing:1.5px; color:#8F2F2C;\">IMAGEN DE REFERENCIA DEL EJERCICIO<\u002Fp>\n            <div style=\"display:grid; grid-template-columns:repeat(auto-fit, minmax(110px, 1fr)); gap:10px;\">\n              <x-import component-from-global-scope=\"image-slot\" id=\"img-cofrecito-1\" shape=\"rounded\" radius=\"12\" placeholder=\"Arrastra o sube tu imagen aquí\" style=\"width:100%; height:150px;\" hint-size=\"100%,150px\"><\u002Fx-import>\n              <x-import component-from-global-scope=\"image-slot\" id=\"img-cofrecito-2\" shape=\"rounded\" radius=\"12\" placeholder=\"Arrastra o sube tu imagen aquí\" style=\"width:100%; height:150px;\" hint-size=\"100%,150px\"><\u002Fx-import>\n              <x-import component-from-global-scope=\"image-slot\" id=\"img-cofrecito-3\" shape=\"rounded\" radius=\"12\" placeholder=\"Arrastra o sube tu imagen aquí\" style=\"width:100%; height:150px;\" hint-size=\"100%,150px\"><\u002Fx-import>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <p style=\"margin:0; padding:12px 14px; background:#EFE7D8; border-radius:10px; font-size:.93em; color:#6E201E;\"><strong>Cierre reflexivo:<\u002Fstrong> ¿Qué tan importante fue la precisión en la acción para que el juego funcionara? ¿Cómo se relaciona este nivel de atención con los personajes de la obra? ¿Qué diálogos podrían funcionar como «cofrecitos» simbólicos (por ejemplo, la carta, el sello real o la ventana)?<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdetails>\n\n      <details open=\"{{ fichasOpen }}\" style=\"background:#FFFDF8; border:1px solid #D9D0C1; border-radius:14px;\">\n        <summary style=\"display:flex; align-items:center; gap:12px; padding:16px 18px;\"><span data-chev=\"1\" style=\"display:inline-block; color:#8F2F2C; font-size:11px;\">▶<\u002Fspan><span style=\"font-family:'Fraunces',serif; font-weight:700; font-size:1.1em; color:#26211B;\">Ficha del ejercicio: «Entonces, ¿qué?»<\u002Fspan><\u002Fsummary>\n        <div style=\"padding:0 18px 18px;\">\n          <div style=\"display:grid; gap:1px; background:#EFE7D8; border:1px solid #EFE7D8; border-radius:10px; overflow:hidden; margin:0 0 14px;\">\n            <div style=\"background:#FFFDF8; padding:11px 14px; display:grid; grid-template-columns:minmax(110px,170px) 1fr; gap:12px;\"><strong style=\"font-size:.85em; color:#6E201E;\">Tipo<\u002Fstrong><span style=\"font-size:.93em;\">Improvisación de acción y reacción – Juego de aceptación<\u002Fspan><\u002Fdiv>\n            <div style=\"background:#FFFDF8; padding:11px 14px; display:grid; grid-template-columns:minmax(110px,170px) 1fr; gap:12px;\"><strong style=\"font-size:.85em; color:#6E201E;\">Objetivo pedagógico<\u002Fstrong><span style=\"font-size:.93em;\">Practicar la continuidad escénica y el desarrollo lógico/creativo de propuestas del compañero o la compañera<\u002Fspan><\u002Fdiv>\n            <div style=\"background:#FFFDF8; padding:11px 14px; display:grid; grid-template-columns:minmax(110px,170px) 1fr; gap:12px;\"><strong style=\"font-size:.85em; color:#6E201E;\">Aplicación en el aula<\u002Fstrong><span style=\"font-size:.93em;\">Para generar secuencias escénicas en las que cada acción tenga una respuesta aceptada y transformada<\u002Fspan><\u002Fdiv>\n            <div style=\"background:#FFFDF8; padding:11px 14px; display:grid; grid-template-columns:minmax(110px,170px) 1fr; gap:12px;\"><strong style=\"font-size:.85em; color:#6E201E;\">Vinculación con la obra<\u002Fstrong><span style=\"font-size:.93em;\">Desarrolla la comprensión de secuencias narrativas, interpretación y expresión corporal<\u002Fspan><\u002Fdiv>\n            <div style=\"background:#FFFDF8; padding:11px 14px; display:grid; grid-template-columns:minmax(110px,170px) 1fr; gap:12px;\"><strong style=\"font-size:.85em; color:#6E201E;\">Materiales<\u002Fstrong><span style=\"font-size:.93em;\">No requiere materiales físicos<\u002Fspan><\u002Fdiv>\n            <div style=\"background:#FFFDF8; padding:11px 14px; display:grid; grid-template-columns:minmax(110px,170px) 1fr; gap:12px;\"><strong style=\"font-size:.85em; color:#6E201E;\">Variaciones útiles<\u002Fstrong><span style=\"font-size:.93em;\">Puede adaptarse a escenas de la obra para improvisar consecuencias de eventos hipotéticos<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <h4 style=\"margin:0 0 10px; font-family:'Fraunces',serif; font-weight:700; font-size:1.05em; color:#26211B;\">Instrucciones del juego — paso a paso<\u002Fh4>\n          <ol style=\"margin:0 0 12px; padding:0 0 0 20px; display:grid; gap:8px; font-size:.95em;\">\n            <li><strong>Formación del grupo:<\u002Fstrong> organizar al grupo en parejas; cada pareja se coloca frente a frente, distribuida en el espacio del aula.<\u002Fli>\n            <li><strong>Inicio del juego:<\u002Fstrong> la persona A propone una oración y acción relacionada con la obra («Amal saluda con respeto al médico»). La persona B acciona y pregunta al instante «Entonces, ¿qué…?»; A continúa con nueva oración y acción («y se levanta de la cama»).<\u002Fli>\n            <li><strong>Búsqueda de conexión:<\u002Fstrong> el intercambio continúa alternando roles: cada respuesta plantea una nueva acción que abre otro desarrollo. Cada intervención debe contribuir a la progresión dramática: aumentar tensión, proponer una solución o generar un nuevo conflicto.<\u002Fli>\n            <li><strong>Cierre del juego:<\u002Fstrong> se busca un cierre de la historia. Si se sale de la coherencia de la obra (Persona A: «convertido en un dinosaurio»), la persona B corta con un «No» juguetón (voz de diva) y se empieza de nuevo.<\u002Fli>\n          <\u002Fol>\n          <div style=\"margin:0 0 14px;\">\n            <p style=\"margin:0 0 6px; font-size:11px; font-weight:700; letter-spacing:1.5px; color:#8F2F2C;\">IMAGEN DE REFERENCIA DEL EJERCICIO<\u002Fp>\n            <div style=\"display:grid; grid-template-columns:repeat(auto-fit, minmax(150px, 1fr)); gap:12px;\">\n              <x-import component-from-global-scope=\"image-slot\" id=\"img-entonces-que-1\" shape=\"rounded\" radius=\"12\" placeholder=\"Arrastra o sube tu imagen aquí\" style=\"width:100%; height:180px;\" hint-size=\"100%,180px\"><\u002Fx-import>\n              <x-import component-from-global-scope=\"image-slot\" id=\"img-entonces-que-2\" shape=\"rounded\" radius=\"12\" placeholder=\"Arrastra o sube tu imagen aquí\" style=\"width:100%; height:180px;\" hint-size=\"100%,180px\"><\u002Fx-import>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <p style=\"margin:0; padding:12px 14px; background:#EFE7D8; border-radius:10px; font-size:.93em; color:#6E201E;\"><strong>Cierre reflexivo:<\u002Fstrong> ¿Fue fácil responder con una acción física o verbal al mismo tiempo? ¿En qué medida las respuestas revelaron motivaciones ocultas de los personajes? ¿Qué decisiones en la obra podrían entenderse como resultados de un «Entonces, ¿qué…?» (el aislamiento de Amal, la intervención del cartero)? ¿Cómo cambia la escena cuando las respuestas tienden a soluciones prácticas vs. cuando generan más conflicto?<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdetails>\n\n      <div style=\"margin:16px 0 0;\">\n        <label for=\"ta-s4\" style=\"display:block; margin:0 0 6px; font-size:11.5px; font-weight:700; letter-spacing:1.5px; color:#8F2F2C;\">MIS NOTAS DE ESTA SESIÓN<\u002Flabel>\n        <textarea id=\"ta-s4\" value=\"{{ notes.s4 }}\" sc-camel-on-change=\"{{ noteOn.s4 }}\" placeholder=\"Observaciones, adaptaciones, resultados…\" style=\"width:100%; box-sizing:border-box; min-height:90px; padding:14px; border:1px solid #D9D0C1; border-radius:10px; background:#FFFDF8; color:#26211B; font:inherit; line-height:1.6; resize:vertical;\"><\u002Ftextarea>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== Sesión 5 ===== -->\n  <section id=\"sesion5\" data-screen-label=\"Sesión 5\" style=\"padding:0 20px clamp(44px,7vw,72px); scroll-margin-top:120px;\">\n    <div style=\"max-width:1080px; margin:0 auto;\">\n      <p style=\"margin:0 0 6px; font-size:11.5px; font-weight:700; letter-spacing:2.5px; color:#8F2F2C;\">SESIÓN 5 · RECREACIÓN DE ESCENAS<\u002Fp>\n      <h2 style=\"margin: 0 0 14px; font-family: 'Fraunces',serif; font-weight: 800; font-size: clamp(26px,5.5vw,40px); color: #26211B; line-height: 54.25px\">Construcción de historias <br>(Recreación de escenas)<\u002Fh2>\n      <p style=\"margin:0 0 10px; max-width:70ch;\">Los grupos seleccionarán un tema o personaje de «El cartero del rey» y crearán una escena improvisada de 3-5 minutos. La persona docente dará una consigna general (ej. «Amal recibe una visita inesperada», «El Cartero se encuentra con un nuevo amigo en su ruta»).<\u002Fp>\n      <p style=\"margin:0 0 22px; max-width:70ch;\">Con las bases de escucha y aceptación, las personas estudiantes estarán listos y listas para construir narrativas completas, aplicando la estructura dramática a sus improvisaciones basadas en la obra.<\u002Fp>\n      <div style=\"display:grid; grid-template-columns:repeat(auto-fit, minmax(270px, 1fr)); gap:14px; margin:0 0 18px;\">\n        <article style=\"background:#FFFDF8; border:1px solid #D9D0C1; border-radius:14px; padding:20px;\">\n          <h3 style=\"margin:0 0 8px; font-family:'Fraunces',serif; font-weight:700; font-size:1.15em; color:#26211B;\">Había una vez<\u002Fh3>\n          <p style=\"margin: 0; font-size: .95em; line-height: 27.8px\">Cada estudiante inicia una historia con esta frase: Había una vez… Que todos los días… Hasta que un día… Entonces… Finalmente. Presenta un personaje o situación, los y las demás continúan la historia, alternando turnos y construyendo un conflicto y una resolución. Se enfocará en escenas de la obra que pueden ser puntos de partida.<\u002Fp>\n        <\u002Farticle>\n        <article style=\"background:#FFFDF8; border:1px solid #D9D0C1; border-radius:14px; padding:20px;\">\n          <h3 style=\"margin:0 0 8px; font-family:'Fraunces',serif; font-weight:700; font-size:1.15em; color:#26211B;\">P.R.O.L. (Personaje, Relación, Objetivo, Lugar)<\u002Fh3>\n          <p style=\"margin: 0; font-size: .95em; line-height: 27.7px; font-weight: 400; text-decoration-line: none\">Se les dará un tema inicial inspirado en la obra (ej. «Esperando al rey»). Deben improvisar siguiendo esta estructura: <b>P.<\u002Fb> ¿Cuál es el personaje? <b>R.<\u002Fb> ¿Cómo se relacionan los personajes? <b>O.<\u002Fb> ¿Cuál es el objetivo?<b> L.<\u002Fb> <br>¿En qué lugar ocurre la historia? Tomando en cuenta el motor y la expansión en diferentes momentos de la obra.<\u002Fp>\n        <\u002Farticle>\n      <\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns:repeat(3, 1fr); gap:10px; margin:0 0 18px;\">\n        <div style=\"background:#EFE7D8; border-radius:12px; padding:14px; text-align:center;\"><p style=\"margin:0; font-family:'Fraunces',serif; font-weight:800; font-size:1.5em; color:#6E201E;\">30<\u002Fp><p style=\"margin:2px 0 0; font-size:.75em; color:#5C5446;\">Minutos por actividad<\u002Fp><\u002Fdiv>\n        <div style=\"background:#EFE7D8; border-radius:12px; padding:14px; text-align:center;\"><p style=\"margin:0; font-family:'Fraunces',serif; font-weight:800; font-size:1.5em; color:#6E201E;\">100%<\u002Fp><p style=\"margin:2px 0 0; font-size:.75em; color:#5C5446;\">Participación del grupo<\u002Fp><\u002Fdiv>\n        <div style=\"background:#EFE7D8; border-radius:12px; padding:14px; text-align:center;\"><p style=\"margin:0; font-family:'Fraunces',serif; font-weight:800; font-size:1.5em; color:#6E201E;\">2<\u002Fp><p style=\"margin:2px 0 0; font-size:.75em; color:#5C5446;\">Actividades complementarias<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <p style=\"margin:0 0 18px; padding:16px 20px; background:#EFE7D8; border-radius:12px; color:#6E201E;\"><strong>Vinculación con la obra:<\u002Fstrong> ¿Qué descubrieron sobre el «viaje» de Amal al improvisar sus escenas? ¿Cómo el uso de la improvisación les ayudó a comprender mejor los temas y el mensaje de Tagore? ¿Qué aprendizajes clave se llevan de esta experiencia, tanto a nivel literario como personal?<\u002Fp>\n\n      <details open=\"{{ fichasOpen }}\" style=\"background:#FFFDF8; border:1px solid #D9D0C1; border-radius:14px; margin:0 0 10px;\">\n        <summary style=\"display:flex; align-items:center; gap:12px; padding:16px 18px;\"><span data-chev=\"1\" style=\"display:inline-block; color:#8F2F2C; font-size:11px;\">▶<\u002Fspan><span style=\"font-family:'Fraunces',serif; font-weight:700; font-size:1.1em; color:#26211B;\">Ficha del ejercicio: «Había una vez»<\u002Fspan><\u002Fsummary>\n        <div style=\"padding:0 18px 18px;\">\n          <div style=\"display:grid; gap:1px; background:#EFE7D8; border:1px solid #EFE7D8; border-radius:10px; overflow:hidden; margin:0 0 14px;\">\n            <div style=\"background:#FFFDF8; padding:11px 14px; display:grid; grid-template-columns:minmax(110px,170px) 1fr; gap:12px;\"><strong style=\"font-size:.85em; color:#6E201E;\">Tipo<\u002Fstrong><span style=\"font-size:.93em;\">Narración guiada – Estructura de historia<\u002Fspan><\u002Fdiv>\n            <div style=\"background:#FFFDF8; padding:11px 14px; display:grid; grid-template-columns:minmax(110px,170px) 1fr; gap:12px;\"><strong style=\"font-size:.85em; color:#6E201E;\">Objetivo pedagógico<\u002Fstrong><span style=\"font-size:.93em;\">Practicar la creación narrativa con estructura clara y progresión lógica<\u002Fspan><\u002Fdiv>\n            <div style=\"background:#FFFDF8; padding:11px 14px; display:grid; grid-template-columns:minmax(110px,170px) 1fr; gap:12px;\"><strong style=\"font-size:.85em; color:#6E201E;\">Aplicación en el aula<\u002Fstrong><span style=\"font-size:.93em;\">Ideal para cierre de taller o creación de historias inspiradas en personajes de la obra<\u002Fspan><\u002Fdiv>\n            <div style=\"background:#FFFDF8; padding:11px 14px; display:grid; grid-template-columns:minmax(110px,170px) 1fr; gap:12px;\"><strong style=\"font-size:.85em; color:#6E201E;\">Vinculación con la obra<\u002Fstrong><span style=\"font-size:.93em;\">Reforzar la expresión escrita, la planificación de historias y el análisis de estructura narrativa<\u002Fspan><\u002Fdiv>\n            <div style=\"background:#FFFDF8; padding:11px 14px; display:grid; grid-template-columns:minmax(110px,170px) 1fr; gap:12px;\"><strong style=\"font-size:.85em; color:#6E201E;\">Materiales<\u002Fstrong><span style=\"font-size:.93em;\">No requiere materiales físicos<\u002Fspan><\u002Fdiv>\n            <div style=\"background:#FFFDF8; padding:11px 14px; display:grid; grid-template-columns:minmax(110px,170px) 1fr; gap:12px;\"><strong style=\"font-size:.85em; color:#6E201E;\">Variaciones útiles<\u002Fstrong><span style=\"font-size:.93em;\">Se puede utilizar con cartas ilustradas o imágenes de personajes<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <h4 style=\"margin:0 0 10px; font-family:'Fraunces',serif; font-weight:700; font-size:1.05em; color:#26211B;\">Instrucciones del juego — paso a paso<\u002Fh4>\n          <ol style=\"margin:0 0 12px; padding:0 0 0 20px; display:grid; gap:8px; font-size:.95em;\">\n            <li><strong>Formación del grupo:<\u002Fstrong> el grupo se organiza en círculo (de pie o sentados). La persona docente se ubica como primera narradora y la historia se desarrolla en orden secuencial hacia el lado derecho o izquierdo.<\u002Fli>\n            <li><strong>Inicio del juego:<\u002Fstrong> la persona docente inicia la historia con la frase introductoria «Había una vez…», situando el contexto y al personaje principal, directamente vinculado con la obra. Docente: «Había una vez un niño llamado Amal que vivía encerrado por su enfermedad».<\u002Fli>\n            <li><strong>Desarrollo secuencial:<\u002Fstrong> cada estudiante aporta una parte de la historia, siguiendo un orden narrativo guiado por conectores específicos:\n              <ul style=\"margin:8px 0 0; padding:0 0 0 20px; display:grid; gap:6px;\">\n                <li><strong>Estudiante 1 (Rutina):<\u002Fstrong> «Que todos los días…» describe la costumbre o la situación habitual. «Que todos los días miraba por la ventana a los hombres y mujeres que pasaban».<\u002Fli>\n                <li><strong>Estudiante 2 (Conflicto):<\u002Fstrong> «Hasta que un día…» introduce el cambio o el problema central. «Hasta que un día escuchó al cartero hablar de una carta enviada por el rey».<\u002Fli>\n                <li><strong>Estudiante 3 (Clímax):<\u002Fstrong> «Entonces…» conduce al punto más intenso o decisivo. «Entonces, el cartero llegó con un mensaje que cambiaría su vida».<\u002Fli>\n                <li><strong>Estudiante 4 (Desenlace):<\u002Fstrong> «Finalmente…» cierra la historia con una reflexión o transformación. «Finalmente, Amal dejó de temerle a la enfermedad y soñó con ser libre».<\u002Fli>\n              <\u002Ful>\n            <\u002Fli>\n          <\u002Fol>\n          <div style=\"margin:0 0 14px;\">\n            <p style=\"margin:0 0 6px; font-size:11px; font-weight:700; letter-spacing:1.5px; color:#8F2F2C;\">IMAGEN DE REFERENCIA DEL EJERCICIO<\u002Fp>\n            <div style=\"display:grid; grid-template-columns:repeat(auto-fit, minmax(110px, 1fr)); gap:10px;\">\n              <x-import component-from-global-scope=\"image-slot\" id=\"img-habia-una-vez-1\" shape=\"rounded\" radius=\"12\" placeholder=\"Arrastra o sube tu imagen aquí\" style=\"width:100%; height:150px;\" hint-size=\"100%,150px\"><\u002Fx-import>\n              <x-import component-from-global-scope=\"image-slot\" id=\"img-habia-una-vez-2\" shape=\"rounded\" radius=\"12\" placeholder=\"Arrastra o sube tu imagen aquí\" style=\"width:100%; height:150px;\" hint-size=\"100%,150px\"><\u002Fx-import>\n              <x-import component-from-global-scope=\"image-slot\" id=\"img-habia-una-vez-3\" shape=\"rounded\" radius=\"12\" placeholder=\"Arrastra o sube tu imagen aquí\" style=\"width:100%; height:150px;\" hint-size=\"100%,150px\"><\u002Fx-import>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <p style=\"margin:0; padding:12px 14px; background:#EFE7D8; border-radius:10px; font-size:.93em; color:#6E201E;\"><strong>Cierre reflexivo:<\u002Fstrong> ¿Qué parte de la historia representó el cambio más importante? ¿La frase «Finalmente…» refleja la verdadera conclusión de la obra o deja abierta una interpretación simbólica (esperanza, libertad, trascendencia)? ¿Qué aprendimos sobre cómo se construye una historia a partir de una secuencia lógica?<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdetails>\n\n      <details open=\"{{ fichasOpen }}\" style=\"background:#FFFDF8; border:1px solid #D9D0C1; border-radius:14px;\">\n        <summary style=\"display:flex; align-items:center; gap:12px; padding:16px 18px;\"><span data-chev=\"1\" style=\"display:inline-block; color:#8F2F2C; font-size:11px;\">▶<\u002Fspan><span style=\"font-family:'Fraunces',serif; font-weight:700; font-size:1.1em; color:#26211B;\">Ficha del ejercicio: «P.R.O.L. (Personaje, Relación, Objetivo, Lugar)»<\u002Fspan><\u002Fsummary>\n        <div style=\"padding:0 18px 18px;\">\n          <div style=\"display:grid; gap:1px; background:#EFE7D8; border:1px solid #EFE7D8; border-radius:10px; overflow:hidden; margin:0 0 14px;\">\n            <div style=\"background:#FFFDF8; padding:11px 14px; display:grid; grid-template-columns:minmax(110px,170px) 1fr; gap:12px;\"><strong style=\"font-size:.85em; color:#6E201E;\">Tipo<\u002Fstrong><span style=\"font-size:.93em;\">Construcción guiada de escenas – Improvisación<\u002Fspan><\u002Fdiv>\n            <div style=\"background:#FFFDF8; padding:11px 14px; display:grid; grid-template-columns:minmax(110px,170px) 1fr; gap:12px;\"><strong style=\"font-size:.85em; color:#6E201E;\">Objetivo pedagógico<\u002Fstrong><span style=\"font-size:.93em;\">Guiar la creación de escenas improvisadas a partir de elementos clave de la narrativa teatral<\u002Fspan><\u002Fdiv>\n            <div style=\"background:#FFFDF8; padding:11px 14px; display:grid; grid-template-columns:minmax(110px,170px) 1fr; gap:12px;\"><strong style=\"font-size:.85em; color:#6E201E;\">Aplicación en el aula<\u002Fstrong><span style=\"font-size:.93em;\">Útil para estructurar pequeñas escenas o dramatizaciones inspiradas en situaciones posibles de la obra<\u002Fspan><\u002Fdiv>\n            <div style=\"background:#FFFDF8; padding:11px 14px; display:grid; grid-template-columns:minmax(110px,170px) 1fr; gap:12px;\"><strong style=\"font-size:.85em; color:#6E201E;\">Vinculación con la obra<\u002Fstrong><span style=\"font-size:.93em;\">Fortalece la planificación narrativa, el análisis de conflicto y la expresión oral<\u002Fspan><\u002Fdiv>\n            <div style=\"background:#FFFDF8; padding:11px 14px; display:grid; grid-template-columns:minmax(110px,170px) 1fr; gap:12px;\"><strong style=\"font-size:.85em; color:#6E201E;\">Materiales<\u002Fstrong><span style=\"font-size:.93em;\">No requiere materiales físicos<\u002Fspan><\u002Fdiv>\n            <div style=\"background:#FFFDF8; padding:11px 14px; display:grid; grid-template-columns:minmax(110px,170px) 1fr; gap:12px;\"><strong style=\"font-size:.85em; color:#6E201E;\">Variaciones útiles<\u002Fstrong><span style=\"font-size:.93em;\">Varios grupos trabajan simultáneamente distintos P.R.O.L. y luego comparten sus escenas, analizando las diferencias en personajes, situaciones y ritmo<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <h4 style=\"margin:0 0 10px; font-family:'Fraunces',serif; font-weight:700; font-size:1.05em; color:#26211B;\">Instrucciones del juego — paso a paso<\u002Fh4>\n          <ol style=\"margin:0 0 12px; padding:0 0 0 20px; display:grid; gap:8px; font-size:.95em;\">\n            <li><strong>Formación del grupo:<\u002Fstrong> se forman pequeños grupos de dos o tres personas. Cada grupo interpretará una breve escena improvisada según el tema asignado.<\u002Fli>\n            <li><strong>Inicio del juego:<\u002Fstrong> la persona docente propone un tema, ejemplo «Carta del Rey», dentro de los cuatro componentes: P (Personaje): Amal · R (Relación): con el cartero · O (Objetivo): recibir la carta del Rey · L (Lugar): dentro de su cuarto.<\u002Fli>\n            <li><strong>Definición de roles e inicio de la escena:<\u002Fstrong> las personas integrantes asumen los personajes y comienzan a improvisar sin ensayar. Toda la acción y el texto giran en torno al objetivo propuesto dentro del lugar indicado. Se mantiene la escucha respondiendo desde el <em>motor<\u002Fem> (algo irreversible: «Amal se queda profundamente dormido»), la <em>expansión<\u002Fem> (detallar el lugar o personaje: «el cuarto es café, pequeño, con una ventana hacia la calle…») y el <em>cierre<\u002Fem> (resumen del objetivo: «después de hablar con el cartero, Amal logró recibir la carta del rey, antes de morir»).<\u002Fli>\n            <li><strong>Coincidencia final:<\u002Fstrong> la improvisación concluye cuando el objetivo se resuelve (se cumpla o no). El siguiente grupo entra en escena con un nuevo conjunto de elementos P.R.O.L.<\u002Fli>\n          <\u002Fol>\n          <div style=\"margin:0 0 14px;\">\n            <p style=\"margin:0 0 6px; font-size:11px; font-weight:700; letter-spacing:1.5px; color:#8F2F2C;\">IMAGEN DE REFERENCIA DEL EJERCICIO<\u002Fp>\n            <div style=\"display:grid; grid-template-columns:repeat(auto-fit, minmax(110px, 1fr)); gap:10px;\">\n              <x-import component-from-global-scope=\"image-slot\" id=\"img-prol-1\" shape=\"rounded\" radius=\"12\" placeholder=\"Arrastra o sube tu imagen aquí\" style=\"width:100%; height:150px;\" hint-size=\"100%,150px\"><\u002Fx-import>\n              <x-import component-from-global-scope=\"image-slot\" id=\"img-prol-2\" shape=\"rounded\" radius=\"12\" placeholder=\"Arrastra o sube tu imagen aquí\" style=\"width:100%; height:150px;\" hint-size=\"100%,150px\"><\u002Fx-import>\n              <x-import component-from-global-scope=\"image-slot\" id=\"img-prol-3\" shape=\"rounded\" radius=\"12\" placeholder=\"Arrastra o sube tu imagen aquí\" style=\"width:100%; height:150px;\" hint-size=\"100%,150px\"><\u002Fx-import>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <p style=\"margin:0; padding:12px 14px; background:#EFE7D8; border-radius:10px; font-size:.93em; color:#6E201E;\"><strong>Cierre reflexivo:<\u002Fstrong> ¿Cómo afectó el Lugar (la ventana, el patio, la calle) en la re-creación de las escenas? ¿Fue fácil mantener el Objetivo del personaje al improvisar? ¿Qué aprendimos sobre cómo las relaciones determinan los cambios dentro de la obra? ¿De qué manera el P.R.O.L. ayuda a comprender más el análisis?<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdetails>\n\n      <div style=\"margin:16px 0 0;\">\n        <label for=\"ta-s5\" style=\"display:block; margin:0 0 6px; font-size:11.5px; font-weight:700; letter-spacing:1.5px; color:#8F2F2C;\">MIS NOTAS DE ESTA SESIÓN<\u002Flabel>\n        <textarea id=\"ta-s5\" value=\"{{ notes.s5 }}\" sc-camel-on-change=\"{{ noteOn.s5 }}\" placeholder=\"Observaciones, adaptaciones, resultados…\" style=\"width:100%; box-sizing:border-box; min-height:90px; padding:14px; border:1px solid #D9D0C1; border-radius:10px; background:#FFFDF8; color:#26211B; font:inherit; line-height:1.6; resize:vertical;\"><\u002Ftextarea>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== Sesión 6 ===== -->\n  <section id=\"sesion6\" data-screen-label=\"Sesión 6\" style=\"padding:0 20px clamp(44px,7vw,72px); scroll-margin-top:120px;\">\n    <div style=\"max-width:1080px; margin:0 auto;\">\n      <p style=\"margin:0 0 6px; font-size:11.5px; font-weight:700; letter-spacing:2.5px; color:#8F2F2C;\">SESIÓN 6 · AMPLIACIÓN<\u002Fp>\n      <h2 style=\"margin: 0 0 14px; font-family: 'Fraunces',serif; font-weight: 800; font-size: clamp(26px,5.5vw,40px); color: #26211B; line-height: 53.8px\">Recomendaciones de libros y videos<\u002Fh2>\n      <p style=\"margin:0 0 22px; max-width:70ch;\">Esta última sesión busca ofrecer un espacio de ampliación del conocimiento para las personas docentes interesadas en continuar explorando la técnica de la improvisación teatral como herramienta educativa. Se presentan lecturas y recursos audiovisuales que complementan las actividades desarrolladas en la guía, aportando nuevas perspectivas para el trabajo pedagógico, el análisis literario y la creación escénica.<\u002Fp>\n      <h3 style=\"margin:0 0 14px; font-family:'Fraunces',serif; font-weight:700; font-size:1.3em; color:#26211B;\">Libros recomendados<\u002Fh3>\n      <div style=\"display:grid; grid-template-columns:repeat(auto-fit, minmax(260px, 1fr)); gap:14px; margin:0 0 26px;\">\n        <article style=\"background:#FFFDF8; border:1px solid #D9D0C1; border-radius:14px; padding:20px;\">\n          <h4 style=\"margin: 0 0 4px; font-family: 'Fraunces',serif; font-weight: 700; font-size: 1.1em; color: #26211B; line-height: 27.75px\">Improvisation for the Theater<\u002Fh4>\n          <p style=\"margin:0 0 10px; font-size:.82em; color:#8F2F2C; font-weight:700;\">VIOLA SPOLIN (1999)<\u002Fp>\n          <p style=\"margin: 0; font-size: .93em; line-height: 27.99px\">Este clásico libro de la improvisación presenta una amplia variedad de juegos teatrales que estimulan la creatividad, la cooperación y la espontaneidad. Spolin plantea que cada participante, al improvisar, se convierte en directora, intérprete y dramaturga al mismo tiempo, construyendo colectivamente el aprendizaje y la escena.<\u002Fp>\n        <\u002Farticle>\n        <article style=\"background:#FFFDF8; border:1px solid #D9D0C1; border-radius:14px; padding:20px;\">\n          <h4 style=\"margin: 0 0 4px; font-family: 'Fraunces',serif; font-weight: 700; font-size: 1.1em; color: #26211B; position: relative; line-height: 28.3px\">Del salto al vuelo. <br>Manual de Impro<\u002Fh4>\n          <p style=\"margin:0 0 10px; font-size:.82em; color:#8F2F2C; font-weight:700;\">OMAR ARGENTINO GALVÁN (2013)<\u002Fp>\n          <p style=\"margin: 0; font-size: .93em; line-height: 27.79px\">Este manual ofrece una guía clara y práctica sobre los fundamentos del teatro de improvisación, integrando teoría, filosofía y entrenamiento actoral. Galván propone una ruta progresiva «del salto al vuelo», donde el cuerpo, la voz y la imaginación se entrenan en libertad para construir historias colectivas.<\u002Fp>\n        <\u002Farticle>\n        <article style=\"background:#FFFDF8; border:1px solid #D9D0C1; border-radius:14px; padding:20px;\">\n          <h4 style=\"margin: 0 0 4px; font-family: 'Fraunces',serif; font-weight: 700; font-size: 1.1em; color: #26211B; line-height: 28.35px\">IMPRO: 90 juegos y ejercicios <br>de improvisación teatral<\u002Fh4>\n          <p style=\"margin:0 0 10px; font-size:.82em; color:#8F2F2C; font-weight:700;\">ALFREDO MANTOVANI ET AL. (2017)<\u002Fp>\n          <p style=\"margin: 0; font-size: .93em; line-height: 27.64px\">Este libro recopila una extensa lista de juegos estructurados por niveles de dificultad. Cada actividad estimula habilidades específicas: escucha, asociación, aceptación y construcción de historias. Su enfoque práctico lo convierte en un material ideal para docentes que deseen aplicar la improvisación en contextos educativos.<\u002Fp>\n        <\u002Farticle>\n      <\u002Fdiv>\n      <h3 style=\"margin:0 0 14px; font-family:'Fraunces',serif; font-weight:700; font-size:1.3em; color:#26211B;\">Videos y recursos audiovisuales<\u002Fh3>\n      <div style=\"display:grid; grid-template-columns:repeat(auto-fit, minmax(280px, 1fr)); gap:14px; margin:0 0 22px;\">\n        <article style=\"background:#EFE7D8; border:1px solid #E0D4BE; border-radius:14px; padding:20px;\">\n          <h4 style=\"margin: 0 0 6px; font-family: 'Fraunces',serif; font-weight: 700; font-size: 1.05em; color: #6E201E; line-height: 24.05px\">Pau Farías — «¿Qué es la improvisación teatral? Tips para improvisar»<\u002Fh4>\n          <p style=\"margin:0 0 12px; font-size:.93em; color:#6E201E;\">La improvisadora Pau Farías explica cómo la improvisación fomenta la creatividad, la escucha y la espontaneidad en las personas.<\u002Fp>\n          <a href=\"https://www.youtube.com/watch?v=UDPrJvQOvUQ\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-block; padding:10px 18px; background:#8F2F2C; color:#F7F2E9; border-radius:999px; font-size:13px; font-weight:700; text-decoration:none;\">Ver en YouTube ↗<\u002Fa>\n        <\u002Farticle>\n        <article style=\"background:#EFE7D8; border:1px solid #E0D4BE; border-radius:14px; padding:20px;\">\n          <h4 style=\"margin: 0 0 6px; font-family: 'Fraunces',serif; font-weight: 700; font-size: 1.05em; color: #6E201E; line-height: 24.4px\">Escuela Impro Barcelona — «¿Cómo es una clase de improvisación teatral?»<\u002Fh4>\n          <p style=\"margin:0 0 12px; font-size:.93em; color:#6E201E;\">Ejercicios prácticos de improvisación que estimulan la imaginación, la cooperación y la construcción narrativa grupal.<\u002Fp>\n          <a href=\"https://www.youtube.com/watch?v=0N5f_2SACds\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-block; padding:10px 18px; background:#8F2F2C; color:#F7F2E9; border-radius:999px; font-size:13px; font-weight:700; text-decoration:none;\">Ver en YouTube ↗<\u002Fa>\n        <\u002Farticle>\n      <\u002Fdiv>\n      <p style=\"margin:0; padding:16px 20px; background:#EFE7D8; border-radius:12px; color:#6E201E;\"><strong>Reflexión y proyección:<\u002Fstrong> la improvisación teatral no se limita a una técnica artística, sino que constituye una metodología pedagógica que impulsa la creatividad, la empatía y el pensamiento crítico. Incorporar esta lectura dramática desde la enseñanza del Español permite a las personas docentes ampliar su repertorio metodológico, fortaleciendo su capacidad para guiar procesos de aprendizaje dinámicos, participativos y significativos.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== Ideas clave ===== -->\n  <section id=\"ideas\" data-screen-label=\"Ideas clave\" style=\"background:#1D1715; background-image:radial-gradient(ellipse 80% 55% at 50% 0%, rgba(214,160,86,.14), transparent 60%); padding:clamp(48px,8vw,80px) 20px; scroll-margin-top:120px;\">\n    <div style=\"max-width:1080px; margin:0 auto;\">\n      <p style=\"margin:0 0 6px; font-size:11.5px; font-weight:700; letter-spacing:2.5px; color:#D6A056;\">PARTE 7 · EL CIERRE<\u002Fp>\n      <h2 style=\"margin: 0 0 10px; font-family: 'Fraunces',serif; font-weight: 800; font-size: clamp(26px,5.5vw,40px); color: #EFE7D8; line-height: 53.6px\">Ideas clave para recordar: <br>Los pilares del aprendizaje creativo<\u002Fh2>\n      <p style=\"margin:0 0 26px; max-width:70ch; color:rgba(239,231,216,.8);\">Esta guía se fundamenta en principios pedagógicos y teatrales que buscan colaborar con las personas estudiantes y docentes en el análisis dramático. A continuación, se resumen las ideas clave que deben guiar todo el proceso:<\u002Fp>\n      <div style=\"display:grid; grid-template-columns:repeat(auto-fit, minmax(280px, 1fr)); gap:14px;\">\n        <article style=\"background:rgba(247,242,233,.05); border:1px solid rgba(214,160,86,.3); border-radius:16px; padding:26px; color:rgba(239,231,216,.85);\">\n          <div style=\"width:64px; height:64px; border-radius:50%; background:rgba(214,160,86,.12); border:1px solid rgba(214,160,86,.45); display:grid; place-items:center; margin:0 0 16px;\"><svg width=\"34\" height=\"34\" sc-camel-view-box=\"0 0 48 48\" fill=\"none\" stroke=\"#D6A056\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\" aria-hidden=\"true\"><path d=\"M24 5l15 5v12c0 9-6 15-15 21C15 37 9 31 9 22V10z\"><\u002Fpath><path d=\"M17 24l5 5 9-10\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <h3 style=\"margin: 0 0 10px; font-family: 'Fraunces',serif; font-weight: 700; font-size: 1.25em; color: #EFE7D8; line-height: 27.56px\">Toda persona puede improvisar si se <br>siente segura<\u002Fh3>\n          <p style=\"margin: 0; font-size: .93em; line-height: 28.04px\">La improvisación no es un don innato reservado para unos pocos, sino una habilidad que se desarrolla y florece en un ambiente de confianza y no juicio. Es fundamental que la persona docente cree un espacio donde el error sea visto como una oportunidad de aprendizaje y donde la libertad de expresión sea prioritaria. La seguridad es la base para desatar la creatividad.<\u002Fp>\n        <\u002Farticle>\n        <article style=\"background:rgba(247,242,233,.05); border:1px solid rgba(214,160,86,.3); border-radius:16px; padding:26px; color:rgba(239,231,216,.85);\">\n          <div style=\"width:64px; height:64px; border-radius:50%; background:rgba(214,160,86,.12); border:1px solid rgba(214,160,86,.45); display:grid; place-items:center; margin:0 0 16px;\"><svg width=\"34\" height=\"34\" sc-camel-view-box=\"0 0 48 48\" fill=\"none\" stroke=\"#D6A056\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\" aria-hidden=\"true\"><path d=\"M15 21a11 11 0 0 1 22 0c0 6-5 8-7 12-1.5 3-3 7-8 7-4 0-6-3-6-6\"><\u002Fpath><path d=\"M21 21a5 5 0 0 1 10 0c0 3-2 4-3 6\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <h3 style=\"margin: 0 0 10px; font-family: 'Fraunces',serif; font-weight: 700; font-size: 1.25em; color: #EFE7D8; line-height: 27.71px\">La escucha y la aceptación son pilares de la improvisación<\u002Fh3>\n          <p style=\"margin: 0; font-size: .93em; line-height: 27.59px\">Estos dos conceptos, a menudo subestimados, son el corazón de la improvisación teatral. La escucha activa implica prestar atención genuina a las palabras, acciones y propuestas de las personas compañeras. La aceptación («sí y…») significa construir sobre esas propuestas, sin negarlas, para que <br>la escena o la historia avance de <br>forma orgánica.<\u002Fp>\n        <\u002Farticle>\n        <article style=\"background:rgba(247,242,233,.05); border:1px solid rgba(214,160,86,.3); border-radius:16px; padding:26px; color:rgba(239,231,216,.85);\">\n          <div style=\"width:64px; height:64px; border-radius:50%; background:rgba(214,160,86,.12); border:1px solid rgba(214,160,86,.45); display:grid; place-items:center; margin:0 0 16px;\"><svg width=\"34\" height=\"34\" sc-camel-view-box=\"0 0 48 48\" fill=\"none\" stroke=\"#D6A056\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\" aria-hidden=\"true\"><path d=\"M15 15v18\"><\u002Fpath><path d=\"M9 19v10\"><\u002Fpath><path d=\"M33 15v18\"><\u002Fpath><path d=\"M39 19v10\"><\u002Fpath><path d=\"M15 24h18\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <h3 style=\"margin: 0 0 10px; font-family: 'Fraunces',serif; font-weight: 700; font-size: 1.25em; color: #EFE7D8; line-height: 28.31px\">La creatividad <br>también se entrena<\u002Fh3>\n          <p style=\"margin: 0; font-size: .93em; line-height: 27.79px\">Así como un músculo, la creatividad se fortalece con la práctica regular. Los ejercicios de improvisación son como un gimnasio para la imaginación, la espontaneidad y la capacidad de resolver problemas de forma original. Cuanto más se ejerciten, más fluidas <br>y sorprendentes serán las ideas que surjan. Este entrenamiento va más <br>allá del aula y nutre la capacidad de innovar en cualquier aspecto de <br>la vida.<\u002Fp>\n        <\u002Farticle>\n        <article style=\"background:rgba(247,242,233,.05); border:1px solid rgba(214,160,86,.3); border-radius:16px; padding:26px; color:rgba(239,231,216,.85);\">\n          <div style=\"width:64px; height:64px; border-radius:50%; background:rgba(214,160,86,.12); border:1px solid rgba(214,160,86,.45); display:grid; place-items:center; margin:0 0 16px;\"><svg width=\"34\" height=\"34\" sc-camel-view-box=\"0 0 48 48\" fill=\"none\" stroke=\"#D6A056\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\" aria-hidden=\"true\"><path d=\"M27 6h13v36H27\"><\u002Fpath><path d=\"M27 6L13 10v30l14 4z\"><\u002Fpath><circle cx=\"23\" cy=\"25\" r=\"1.6\" fill=\"#D6A056\" stroke=\"none\"><\u002Fcircle><\u002Fsvg><\u002Fdiv>\n          <h3 style=\"margin: 0 0 10px; font-family: 'Fraunces',serif; font-weight: 700; font-size: 1.25em; color: #EFE7D8; line-height: 28.01px\">El teatro puede ser una puerta para valorar mejor la literatura<\u002Fh3>\n          <p style=\"margin: 0; font-size: .93em; line-height: 27.74px\">La literatura, especialmente el drama, cobra vida en la escena. Al pasar de <br>la lectura a la interpretación y la improvisación, las personas estudiantes no solo «analizan» la obra, sino que la «encarnan». <br>El teatro ofrece una dimensión vital que enriquece potencialmente el análisis literario.<\u002Fp>\n        <\u002Farticle>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== Referencias ===== -->\n  <footer id=\"referencias\" data-screen-label=\"Referencias\" style=\"background:#1D1715; color:#EFE7D8; padding:clamp(40px,7vw,64px) 20px 56px; scroll-margin-top:120px;\">\n    <div style=\"max-width:1080px; margin:0 auto;\">\n      <p style=\"margin:0 0 6px; font-size:11.5px; font-weight:700; letter-spacing:2.5px; color:#D6A056;\">PARTE 8<\u002Fp>\n      <h2 style=\"margin: 0 0 18px; font-family: 'Fraunces',serif; font-weight: 800; font-size: clamp(26px,5.5vw,40px); color: #EFE7D8; line-height: 53.85px\">Referencias<\u002Fh2>\n      <ul style=\"margin:0; padding:0; list-style:none; display:grid; gap:10px; font-size:.9em; color:rgba(239,231,216,.8);\">\n        <li style=\"padding:12px 16px; background:rgba(247,242,233,.06); border:1px solid rgba(247,242,233,.14); border-radius:10px;\"><em>El cartero del rey<\u002Fem> libro.pdf. (n.d.). Google Docs.<\u002Fli>\n        <li style=\"padding:12px 16px; background:rgba(247,242,233,.06); border:1px solid rgba(247,242,233,.14); border-radius:10px;\">Escuela Impro Barcelona. (2018). <em>¿Cómo es una clase de improvisación teatral?<\u002Fem> [Video]. YouTube.<\u002Fli>\n        <li style=\"padding:12px 16px; background:rgba(247,242,233,.06); border:1px solid rgba(247,242,233,.14); border-radius:10px;\">Farías, P. (2020). <em>Improvisación teatral y creatividad. ¿Qué es la improvisación teatral? Tips para improvisar<\u002Fem> [Video]. YouTube.<\u002Fli>\n        <li style=\"padding:12px 16px; background:rgba(247,242,233,.06); border:1px solid rgba(247,242,233,.14); border-radius:10px;\">Galván, O. (2013). <em>Del salto al vuelo<\u002Fem> (1.ª ed.). Improtour.<\u002Fli>\n        <li style=\"padding:12px 16px; background:rgba(247,242,233,.06); border:1px solid rgba(247,242,233,.14); border-radius:10px;\">Mantovani, A., Muñoz, J., Cortés, B., Pundik, P., &amp; Corrales, E. (2017). <em>Impro: 90 juegos y ejercicios de improvisación teatral<\u002Fem> (2.ª ed., Vol. 155). Ediciones Octaedro.<\u002Fli>\n        <li style=\"padding:12px 16px; background:rgba(247,242,233,.06); border:1px solid rgba(247,242,233,.14); border-radius:10px;\">Ministerio de Educación Pública. (2017). <em>Educar para una nueva ciudadanía: Programa de estudio de Español tercer ciclo y educación diversificada<\u002Fem>. Imprenta Nacional.<\u002Fli>\n        <li style=\"padding:12px 16px; background:rgba(247,242,233,.06); border:1px solid rgba(247,242,233,.14); border-radius:10px;\">Spolin, V. (1999). <em>Improvisation for the theater: A handbook of teaching and directing techniques<\u002Fem> (3rd ed.). Northwestern University Press.<\u002Fli>\n        <li style=\"padding:12px 16px; background:rgba(247,242,233,.06); border:1px solid rgba(247,242,233,.14); border-radius:10px;\">WTTW. (2021). <em>Inventing Improv: A Chicago Stories special documentary<\u002Fem> [Video]. YouTube.<\u002Fli>\n      <\u002Ful>\n      <p style=\"margin:20px 0 0; font-size:.8em; color:rgba(239,231,216,.55);\">Guía didáctica interactiva · «El cartero del rey» de Rabindranath Tagore · Tus notas se guardan únicamente en tu dispositivo.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;fichasAbiertas&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: false, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Lectura&quot;, &quot;description&quot;: &quot;Abre todas las fichas técnicas de ejercicios de una vez (útil para imprimir o revisar la guía completa)&quot;}\n}\">\nclass Component extends DCLogic {\n  state = { fontPx: 16, notes: {} };\n\n  componentDidMount() {\n    try {\n      const f = localStorage.getItem('ecdr2_font');\n      const n = localStorage.getItem('ecdr2_notes');\n      const patch = {};\n      if (f && !isNaN(Number(f))) patch.fontPx = Math.min(21, Math.max(14, Number(f)));\n      if (n) patch.notes = JSON.parse(n);\n      if (Object.keys(patch).length) this.setState(patch);\n    } catch (e) {}\n    this._onScroll = () => {\n      const d = document.documentElement;\n      const max = Math.max(1, d.scrollHeight - d.clientHeight);\n      if (this._bar) this._bar.style.width = ((d.scrollTop / max) * 100).toFixed(1) + '%';\n    };\n    window.addEventListener('scroll', this._onScroll, { passive: true });\n    this._onScroll();\n  }\n\n  componentWillUnmount() {\n    window.removeEventListener('scroll', this._onScroll);\n  }\n\n  setFont(delta) {\n    const fontPx = Math.min(21, Math.max(14, this.state.fontPx + delta));\n    this.setState({ fontPx });\n    try { localStorage.setItem('ecdr2_font', String(fontPx)); } catch (e) {}\n  }\n\n  saveNote(key, value) {\n    const notes = Object.assign({}, this.state.notes);\n    notes[key] = value;\n    this.setState({ notes });\n    try { localStorage.setItem('ecdr2_notes', JSON.stringify(notes)); } catch (e) {}\n  }\n\n  renderVals() {\n    const notes = {};\n    const noteOn = {};\n    ['s2', 's3', 's4', 's5'].forEach((k) => {\n      notes[k] = this.state.notes[k] || '';\n      noteOn[k] = (e) => this.saveNote(k, e.target.value);\n    });\n    return {\n      fichasOpen: this.props.fichasAbiertas ?? false,\n      fontPx: this.state.fontPx,\n      fontMinus: () => this.setFont(-1),\n      fontPlus: () => this.setFont(1),\n      barRef: (el) => { this._bar = el; },\n      notes,\n      noteOn,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
